# =============================================================================
# REFERENCE ONLY — NOT USED IN THE CONTAINER
# =============================================================================
# The frontend container no longer runs nginx. It uses `serve` (Node.js) on
# port 42069, which is compatible with OpenShift's restricted SCC (non-root).
#
# The /api/ proxy that was here is now handled at the Ingress/Route level.
# See helm/charts/frontend/templates/ingress.yaml (apiProxy.enabled).
#
# Keep this file if you need to stand up a local nginx in front of the app
# outside of Kubernetes (e.g. for testing without a cluster).
# =============================================================================

server {
    listen 42069;
    server_name _;

    root /app/dist;
    index index.html;

    # SPA catch-all
    location / {
        try_files $uri /index.html;
    }

    # /api/ proxy — in Kubernetes this is handled by the Ingress controller.
    # Use this block only when running nginx standalone outside the cluster.
    location /api/ {
        proxy_pass http://backend:6769/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
