# =============================================================================
# Filebeat configuration — ships Kubernetes container logs to Elasticsearch.
# =============================================================================
# Required environment variables (inject via Kubernetes Secret or .env):
#   ELASTICSEARCH_HOSTS    — Elasticsearch address (default: elasticsearch:9200)
#   ELASTICSEARCH_USER     — username            (default: elastic)
#   ELASTICSEARCH_PASSWORD — password            (required, no default)
#   NODE_NAME              — injected by the DaemonSet via fieldRef spec.nodeName
# =============================================================================

filebeat.autodiscover:
  providers:
    - type: kubernetes
      node: ${NODE_NAME}
      hints.enabled: true
      hints.default_config:
        type: container
        paths:
          - /var/log/containers/*${data.kubernetes.container.id}.log

processors:
  - add_kubernetes_metadata:
      host: ${NODE_NAME}
      matchers:
        - logs_path:
            logs_path: "/var/log/containers/"
  - add_fields:
      target: ''
      fields:
        project: zabbix-portal

output.elasticsearch:
  # UPDATE ME: set ELASTICSEARCH_HOSTS to your existing Elasticsearch server URL.
  # e.g. https://elasticsearch.internal.example.com:9200
  # For TLS with a self-signed or internal CA, also add:
  #   ssl.certificate_authorities: ["/path/to/ca.crt"]
  #   ssl.verification_mode: full   # or "none" for local dev only
  hosts: ["${ELASTICSEARCH_HOSTS}"]
  username: "${ELASTICSEARCH_USER:elastic}"
  password: "${ELASTICSEARCH_PASSWORD}"

logging.level: info
logging.to_files: false
