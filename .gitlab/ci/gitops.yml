# =============================================================================
# GitOps — Helm validation + deploy.
# =============================================================================
# Tag-only release pipeline. On every tag:
#   1. Apps that changed since the previous tag get rebuilt and pushed.
#   2. deploy:staging auto-deploys to the staging cluster.
#   3. deploy:production is a manual gate.
#   4. deploy:dr is a manual gate.
#
# Namespaces are pre-created in OpenShift — this pipeline does not create them.
# Set K8S_NAMESPACE in GitLab Settings → CI/CD → Variables to point to the
# existing namespace for this project.
# =============================================================================

.helm_base:
  extends: .base
  image:
    name: <your-helm-image>  # PRIVATE NETWORK: replace with your internal image that has the helm CLI installed (e.g. your-registry/helm:latest)
    entrypoint: [""]
  needs:
    - job: detect
      artifacts: true
  before_script:
    - helm version
    - helm dependency build "helm/charts/$PROJECT_NAME/"

# ── Helm lint ─────────────────────────────────────────────────────────────────
helm:lint:
  extends: .helm_base
  stage: lint
  script:
    - |
      [ "$HELM_CHANGED" = "1" ] || { echo "Helm unchanged — skipping lint."; exit 0; }
      for chart in "helm/charts"/*/; do
        echo "── helm lint $chart"
        helm lint "$chart"
      done
  rules:
    - if: $CI_COMMIT_TAG

# ── Helm template validation ──────────────────────────────────────────────────
helm:template:
  extends: .helm_base
  stage: lint
  script:
    - |
      [ "$HELM_CHANGED" = "1" ] || { echo "Helm unchanged — skipping template check."; exit 0; }
      helm template "$PROJECT_NAME" "helm/charts/$PROJECT_NAME/" --debug > /dev/null
  rules:
    - if: $CI_COMMIT_TAG

# ── Deploy shared setup ───────────────────────────────────────────────────────
.deploy_base:
  extends: .helm_base
  needs:
    - job: detect
      artifacts: true
    - job: backend:docker:build
      optional: true
    - job: frontend:docker:build
      optional: true

.deploy_script: &deploy_script |
  set -ex

  # On a tag push CI_COMMIT_TAG is the release tag (e.g. v1.2.3).
  # On a FORCE_BUILD from a branch CI_COMMIT_TAG is empty — fall back to the short SHA
  # so images are always tagged with something meaningful.
  IMAGE_TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
  if [ -z "$IMAGE_TAG" ]; then
    echo "ERROR: cannot determine image tag — CI_COMMIT_TAG and CI_COMMIT_SHORT_SHA are both empty."
    exit 1
  fi

  echo "── Deploying to environment: $DEPLOY_ENV ────────────────"
  echo "   Tag       : $IMAGE_TAG"
  echo "   Namespace : $DEPLOY_NAMESPACE"
  echo "   Cluster   : $HELM_KUBEAPISERVER"
  echo "──────────────────────────────────────────────────────────"

  # Resolve the last successfully deployed image tag for each app.
  # Scan good revisions (deployed/superseded) newest → oldest until both tags are found.
  DEPLOYED_BACKEND_TAG=""
  DEPLOYED_FRONTEND_TAG=""

  GOOD_REVISIONS=$(helm history "$PROJECT_NAME" -n "$DEPLOY_NAMESPACE" --max 50 2>/dev/null \
    | grep -E '\s(deployed|superseded)\s' \
    | awk '{print $1}' | sort -rn || true)

  if [ -z "$GOOD_REVISIONS" ]; then
    echo "── No previous successful deployment found — treating as first deploy."
  else
    for REV in $GOOD_REVISIONS; do
      if [ -n "$DEPLOYED_BACKEND_TAG" ] && [ -n "$DEPLOYED_FRONTEND_TAG" ]; then
        break
      fi
      echo "── Checking Helm revision $REV ────────────────────────────"
      REV_VALUES=$(helm get values "$PROJECT_NAME" -n "$DEPLOY_NAMESPACE" \
        --revision "$REV" 2>/dev/null || true)
      if [ -z "$DEPLOYED_BACKEND_TAG" ]; then
        DEPLOYED_BACKEND_TAG=$(printf '%s\n' "$REV_VALUES" | awk '
          /^[^ ]/       { s=0 }
          /^backend:/   { s=1 }
          s==1 && /^  image:/  { s=2 }
          s==2 && /^    tag:/  { gsub(/"/,"",$2); if ($2!="") { print $2; exit } }
        ')
      fi
      if [ -z "$DEPLOYED_FRONTEND_TAG" ]; then
        DEPLOYED_FRONTEND_TAG=$(printf '%s\n' "$REV_VALUES" | awk '
          /^[^ ]/        { s=0 }
          /^frontend:/   { s=1 }
          s==1 && /^  image:/  { s=2 }
          s==2 && /^    tag:/  { gsub(/"/,"",$2); if ($2!="") { print $2; exit } }
        ')
      fi
    done
  fi

  # If this environment has no helm history (first deploy here), fall back to
  # the resolved tags from the previous environment in the promotion chain:
  #   production falls back to staging   (STAGING_BACKEND_TAG / STAGING_FRONTEND_TAG)
  #   DR         falls back to production (PRODUCTION_BACKEND_TAG / PRODUCTION_FRONTEND_TAG)
  # These variables are injected via dotenv artifacts from the upstream deploy job.
  if [ "$DEPLOY_ENV" = "production" ]; then
    if [ -z "$DEPLOYED_BACKEND_TAG" ] && [ -n "${STAGING_BACKEND_TAG:-}" ]; then
      DEPLOYED_BACKEND_TAG="$STAGING_BACKEND_TAG"
      echo "→ No production history for backend — falling back to staging: $DEPLOYED_BACKEND_TAG"
    fi
    if [ -z "$DEPLOYED_FRONTEND_TAG" ] && [ -n "${STAGING_FRONTEND_TAG:-}" ]; then
      DEPLOYED_FRONTEND_TAG="$STAGING_FRONTEND_TAG"
      echo "→ No production history for frontend — falling back to staging: $DEPLOYED_FRONTEND_TAG"
    fi
  fi
  if [ "$DEPLOY_ENV" = "dr" ]; then
    if [ -z "$DEPLOYED_BACKEND_TAG" ] && [ -n "${PRODUCTION_BACKEND_TAG:-}" ]; then
      DEPLOYED_BACKEND_TAG="$PRODUCTION_BACKEND_TAG"
      echo "→ No DR history for backend — falling back to production: $DEPLOYED_BACKEND_TAG"
    fi
    if [ -z "$DEPLOYED_FRONTEND_TAG" ] && [ -n "${PRODUCTION_FRONTEND_TAG:-}" ]; then
      DEPLOYED_FRONTEND_TAG="$PRODUCTION_FRONTEND_TAG"
      echo "→ No DR history for frontend — falling back to production: $DEPLOYED_FRONTEND_TAG"
    fi
  fi

  echo "── Resolved deployed tags ────────────────────────────────"
  echo "   DEPLOYED_BACKEND_TAG  = '${DEPLOYED_BACKEND_TAG}'"
  echo "   DEPLOYED_FRONTEND_TAG = '${DEPLOYED_FRONTEND_TAG}'"
  echo "──────────────────────────────────────────────────────────"

  # Write a per-environment dotenv artifact so the next environment in the chain
  # can use these resolved tags as a fallback on its first deploy.
  # staging → production reads staging-tags.env
  # production → DR reads production-tags.env
  case "$DEPLOY_ENV" in
    staging)
      printf 'STAGING_BACKEND_TAG=%s\nSTAGING_FRONTEND_TAG=%s\n' \
        "$DEPLOYED_BACKEND_TAG" "$DEPLOYED_FRONTEND_TAG" > staging-tags.env
      echo "── Exported staging tags for production/DR ───────────────"
      cat staging-tags.env
      echo "──────────────────────────────────────────────────────────"
      ;;
    production)
      printf 'PRODUCTION_BACKEND_TAG=%s\nPRODUCTION_FRONTEND_TAG=%s\n' \
        "$DEPLOYED_BACKEND_TAG" "$DEPLOYED_FRONTEND_TAG" > production-tags.env
      echo "── Exported production tags for DR ───────────────────────"
      cat production-tags.env
      echo "──────────────────────────────────────────────────────────"
      ;;
  esac

  SET_ARGS=""
  if [ "$BACKEND_CHANGED" = "1" ]; then
    echo "→ Pinning backend → $IMAGE_TAG"
    SET_ARGS="$SET_ARGS --set backend.image.tag=$IMAGE_TAG"
  elif [ -n "$DEPLOYED_BACKEND_TAG" ]; then
    echo "→ Backend unchanged, keeping deployed → $DEPLOYED_BACKEND_TAG"
    SET_ARGS="$SET_ARGS --set backend.image.tag=$DEPLOYED_BACKEND_TAG"
  else
    echo "ERROR: Cannot determine backend image tag for '$DEPLOY_ENV'."
    echo "  No helm history found and staging did not run in this pipeline."
    echo "  Fix: trigger staging first, or run FORCE_BUILD to build all images."
    exit 1
  fi

  if [ "$FRONTEND_CHANGED" = "1" ]; then
    echo "→ Pinning frontend → $IMAGE_TAG"
    SET_ARGS="$SET_ARGS --set frontend.image.tag=$IMAGE_TAG"
  elif [ -n "$DEPLOYED_FRONTEND_TAG" ]; then
    echo "→ Frontend unchanged, keeping deployed → $DEPLOYED_FRONTEND_TAG"
    SET_ARGS="$SET_ARGS --set frontend.image.tag=$DEPLOYED_FRONTEND_TAG"
  else
    echo "ERROR: Cannot determine frontend image tag for '$DEPLOY_ENV'."
    echo "  No helm history found and staging did not run in this pipeline."
    echo "  Fix: trigger staging first, or run FORCE_BUILD to build all images."
    exit 1
  fi

  if [ -z "$SET_ARGS" ] && [ "$HELM_CHANGED" != "1" ]; then
    echo "Nothing to update — exiting."
    exit 0
  fi

  # An empty tag means either the image was never built or awk parsed a broken
  # previous deploy — either way, deploying "" would cause an image pull failure.
  _BACKEND_TAG_ARG=$(echo "$SET_ARGS" | grep -o 'backend\.image\.tag=[^ ]*' | cut -d= -f2 || true)
  _FRONTEND_TAG_ARG=$(echo "$SET_ARGS" | grep -o 'frontend\.image\.tag=[^ ]*' | cut -d= -f2 || true)
  if [ -z "$_BACKEND_TAG_ARG" ] || [ -z "$_FRONTEND_TAG_ARG" ]; then
    echo "ERROR: one or more image tags resolved to empty."
    echo "  backend.image.tag  = '${_BACKEND_TAG_ARG}'"
    echo "  frontend.image.tag = '${_FRONTEND_TAG_ARG}'"
    echo "  SET_ARGS           = '$SET_ARGS'"
    exit 1
  fi

  echo "── Variables ──────────────────────────────────────────────"
  echo "   PROJECT_NAME       : $PROJECT_NAME"
  echo "   VALUES_FILE        : $VALUES_FILE"
  echo "   DEPLOY_NAMESPACE   : $DEPLOY_NAMESPACE"
  # DELETED: ARTIFACTORY_REGISTRY variable removed — registry is now hardcoded in the helm --set lines below
  echo "   SET_ARGS           : $SET_ARGS"
  echo "── Values files ───────────────────────────────────────────"
  ls -la "helm/charts/$PROJECT_NAME/values.yaml" "helm/charts/$PROJECT_NAME/$VALUES_FILE" || true
  echo "──────────────────────────────────────────────────────────"

  # PROJECT_NAME = your GitLab CI variable for the Helm release name (e.g. zabbix-portal)
  # DELETED: ARTIFACTORY_REGISTRY variable removed — registry path is now hardcoded below.
  # Replace <your-artifactory-registry> with your actual registry path (e.g. artifactory.example.com/docker-local).
  helm upgrade --install "$PROJECT_NAME" "helm/charts/$PROJECT_NAME/" \
    --namespace "$DEPLOY_NAMESPACE" \
    -f "helm/charts/$PROJECT_NAME/values.yaml" \
    -f "helm/charts/$PROJECT_NAME/$VALUES_FILE" \
    --set backend.image.repository="<your-artifactory-registry>/backend" \
    --set frontend.image.repository="<your-artifactory-registry>/frontend" \
    --set frontend.backendUrl="http://$PROJECT_NAME-backend:6769" \
    --wait \
    --timeout 5m \
    $SET_ARGS

  # Deployment verification is handled by --wait above: Helm polls the OC cluster
  # API (HELM_KUBEAPISERVER + HELM_KUBETOKEN) and only exits 0 once all pods
  # have passed their readiness probes. If any pod fails to become Ready within
  # --timeout 5m, Helm exits non-zero and the pipeline fails.

# ── Deploy to staging (auto on tag) ──────────────────────────────────────────
deploy:staging:
  extends: .deploy_base
  stage: staging
  needs:
    - job: detect
      artifacts: true
    - job: backend:docker:build
      optional: true
    - job: frontend:docker:build
      optional: true
  environment:
    name: staging
    url: $STAGING_URL  # replace STAGING_URL with your GitLab CI variable for the staging environment URL
  variables:
    DEPLOY_ENV: "staging"
    VALUES_FILE: "values-staging.yaml"       # override file merged on top of values.yaml for this environment
    DEPLOY_NAMESPACE: "$K8S_NAMESPACE"        # set K8S_NAMESPACE in GitLab Settings → CI/CD → Variables to your existing OpenShift namespace
    HELM_KUBEAPISERVER: "$STAGING_SERVER"     # replace STAGING_SERVER with your GitLab CI variable for the staging cluster URL
    HELM_KUBETOKEN: "$STAGING_TOKEN"          # replace STAGING_TOKEN with your GitLab CI variable for the staging auth token
    HELM_KUBEINSECURE_SKIP_TLS_VERIFY: "true"
  script:
    - *deploy_script
  artifacts:
    reports:
      dotenv: staging-tags.env   # exports STAGING_BACKEND_TAG + STAGING_FRONTEND_TAG to production/DR jobs
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG
    - if: $FORCE_BUILD  # allow manual force-deploy from any branch

# ── Deploy to production (manual gate) ───────────────────────────────────────
deploy:production:
  extends: .deploy_base
  stage: production
  needs:
    - job: detect
      artifacts: true
    - job: deploy:staging
      optional: true
    - job: backend:docker:build
      optional: true
    - job: frontend:docker:build
      optional: true
  when: manual
  environment:
    name: production
    url: $PRODUCTION_URL  # replace PRODUCTION_URL with your GitLab CI variable for the production environment URL
  variables:
    DEPLOY_ENV: "production"
    VALUES_FILE: "values-production.yaml"    # override file merged on top of values.yaml for this environment
    DEPLOY_NAMESPACE: "$K8S_NAMESPACE"        # set K8S_NAMESPACE in GitLab Settings → CI/CD → Variables to your existing OpenShift namespace
    HELM_KUBEAPISERVER: "$PROD_SERVER"        # replace PROD_SERVER with your GitLab CI variable for the production cluster URL
    HELM_KUBETOKEN: "$PROD_TOKEN"             # replace PROD_TOKEN with your GitLab CI variable for the production auth token
    HELM_KUBEINSECURE_SKIP_TLS_VERIFY: "true"
  script:
    - *deploy_script
  artifacts:
    reports:
      dotenv: production-tags.env   # exports PRODUCTION_BACKEND_TAG + PRODUCTION_FRONTEND_TAG to DR job
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG

# ── Deploy to DR (manual gate) ───────────────────────────────────────────────
deploy:dr:
  extends: .deploy_base
  stage: dr
  needs:
    - job: detect
      artifacts: true
    - job: deploy:production
      optional: true
    - job: backend:docker:build
      optional: true
    - job: frontend:docker:build
      optional: true
  when: manual
  environment:
    name: dr
    url: $DR_URL  # replace DR_URL with your GitLab CI variable for the DR environment URL
  variables:
    DEPLOY_ENV: "dr"
    VALUES_FILE: "values-dr.yaml"            # override file merged on top of values.yaml for this environment
    DEPLOY_NAMESPACE: "$K8S_NAMESPACE"        # set K8S_NAMESPACE in GitLab Settings → CI/CD → Variables to your existing OpenShift namespace
    HELM_KUBEAPISERVER: "$PROD_SERVER"        # DR uses prod cluster — replace if DR has its own cluster URL variable
    HELM_KUBETOKEN: "$PROD_TOKEN"             # DR uses prod token — replace if DR has its own token variable
    HELM_KUBEINSECURE_SKIP_TLS_VERIFY: "true"
  script:
    - *deploy_script
  rules:
    - if: $CI_COMMIT_TAG
