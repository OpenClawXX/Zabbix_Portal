# =============================================================================
# GitOps — Helm validation + ArgoCD deploy.
# =============================================================================
# Tag-only release pipeline. On every tag:
#   1. Apps that changed since the previous tag get rebuilt and pushed.
#   2. deploy:staging auto-syncs the staging Application.
#   3. deploy:production is a manual gate — same rules as the changed apps,
#      with per-app image-tag pinning.
# =============================================================================

.helm_base:
  extends: .base
  image:
    name: alpine/helm:${HELM_VERSION}
    entrypoint: [""]
  needs:
    - job: detect
      artifacts: true
  before_script:
    - helm version
    - helm dependency build "$HELM_CHART_PATH/"

# ── Helm lint ─────────────────────────────────────────────────────────────────
helm:lint:
  extends: .helm_base
  stage: lint
  script:
    - |
      for chart in "$HELM_PATH"/*/; do
        echo "── helm lint $chart"
        helm lint "$chart"
      done
  rules:
    - if: $CI_COMMIT_TAG && $HELM_CHANGED == "1"

# ── Helm template validation ──────────────────────────────────────────────────
helm:template:
  extends: .helm_base
  stage: lint
  script:
    - helm template "$PROJECT_NAME" "$HELM_CHART_PATH/" --debug > /dev/null
  rules:
    - if: $CI_COMMIT_TAG && $HELM_CHANGED == "1"

# ── ArgoCD shared setup ───────────────────────────────────────────────────────
.argocd_base:
  extends: .base
  image: argoproj/argocd:${ARGOCD_CLI_VERSION}
  needs:
    - job: detect
      artifacts: true
    - job: backend:docker:build
      optional: true
    - job: frontend:docker:build
      optional: true
    - job: filebeat:docker:build
      optional: true
    - job: postgres:docker:build
      optional: true
  variables:
    ARGOCD_OPTS: "--server $ARGOCD_SERVER --auth-token $ARGOCD_AUTH_TOKEN --insecure"

# ── Deploy to staging (auto on tag) ──────────────────────────────────────────
deploy:staging:
  extends: .argocd_base
  stage: staging
  environment:
    name: staging
    url: $STAGING_URL
  script:
    - |
      set -e

      # Pin the staging Application to this tag for whichever apps changed.
      # Tags advance the staging deployment in lock-step with what was rebuilt.
      SET_ARGS=""
      if [ "$BACKEND_CHANGED" = "1" ]; then
        echo "→ Pinning $BACKEND_HELM_KEY → $CI_COMMIT_TAG"
        SET_ARGS="$SET_ARGS --helm-set $BACKEND_HELM_KEY.image.tag=$CI_COMMIT_TAG"
      fi
      if [ "$FRONTEND_CHANGED" = "1" ]; then
        echo "→ Pinning $FRONTEND_HELM_KEY → $CI_COMMIT_TAG"
        SET_ARGS="$SET_ARGS --helm-set $FRONTEND_HELM_KEY.image.tag=$CI_COMMIT_TAG"
      fi
      if [ "$FILEBEAT_CHANGED" = "1" ]; then
        echo "→ Pinning $FILEBEAT_HELM_KEY → $CI_COMMIT_TAG"
        SET_ARGS="$SET_ARGS --helm-set $FILEBEAT_HELM_KEY.image.tag=$CI_COMMIT_TAG"
      fi
      if [ "$POSTGRES_CHANGED" = "1" ]; then
        echo "→ Pinning $POSTGRES_HELM_KEY → $CI_COMMIT_TAG"
        SET_ARGS="$SET_ARGS --helm-set $POSTGRES_HELM_KEY.image.tag=$CI_COMMIT_TAG"
      fi

      if [ -n "$SET_ARGS" ]; then
        echo "── argocd app set ─────────────────────────────────────"
        argocd app set "$ARGOCD_APP_STAGING" $ARGOCD_OPTS $SET_ARGS
      fi

      echo "── argocd app sync ────────────────────────────────────"
      argocd app sync "$ARGOCD_APP_STAGING" $ARGOCD_OPTS --timeout 300
      argocd app wait "$ARGOCD_APP_STAGING" $ARGOCD_OPTS --timeout 300 --health --sync
  rules:
    - if: $CI_COMMIT_TAG

# ── Deploy to production (manual gate) ───────────────────────────────────────
# Manual click required even on a tag. Per-app pinning: only the apps that
# changed since the previous tag get a new image tag in production. Unchanged
# apps stay on whatever tag was last set.
deploy:production:
  extends: .argocd_base
  stage: production
  needs:
    - job: detect
      artifacts: true
    - job: deploy:staging
      optional: true
    - job: backend:docker:build
      optional: true
    - job: frontend:docker:build
      optional: true
    - job: filebeat:docker:build
      optional: true
  when: manual
  environment:
    name: production
    url: $PRODUCTION_URL
  script:
    - |
      set -e

      SET_ARGS=""
      if [ "$BACKEND_CHANGED" = "1" ]; then
        echo "→ Pinning $BACKEND_HELM_KEY → $CI_COMMIT_TAG"
        SET_ARGS="$SET_ARGS --helm-set $BACKEND_HELM_KEY.image.tag=$CI_COMMIT_TAG"
      else
        echo "→ Backend unchanged since $PREV_TAG, leaving its image tag as-is"
      fi

      if [ "$FRONTEND_CHANGED" = "1" ]; then
        echo "→ Pinning $FRONTEND_HELM_KEY → $CI_COMMIT_TAG"
        SET_ARGS="$SET_ARGS --helm-set $FRONTEND_HELM_KEY.image.tag=$CI_COMMIT_TAG"
      else
        echo "→ Frontend unchanged since $PREV_TAG, leaving its image tag as-is"
      fi

      if [ "$FILEBEAT_CHANGED" = "1" ]; then
        echo "→ Pinning $FILEBEAT_HELM_KEY → $CI_COMMIT_TAG"
        SET_ARGS="$SET_ARGS --helm-set $FILEBEAT_HELM_KEY.image.tag=$CI_COMMIT_TAG"
      else
        echo "→ Filebeat unchanged since $PREV_TAG, leaving its image tag as-is"
      fi
      if [ "$POSTGRES_CHANGED" = "1" ]; then
        echo "→ Pinning $POSTGRES_HELM_KEY → $CI_COMMIT_TAG"
        SET_ARGS="$SET_ARGS --helm-set $POSTGRES_HELM_KEY.image.tag=$CI_COMMIT_TAG"
      else
        echo "→ Postgres unchanged since $PREV_TAG, leaving its image tag as-is"
      fi

      if [ -z "$SET_ARGS" ] && [ "$HELM_CHANGED" != "1" ]; then
        echo "Nothing to update — exiting."
        exit 0
      fi

      if [ -n "$SET_ARGS" ]; then
        echo "── argocd app set ─────────────────────────────────────"
        argocd app set "$ARGOCD_APP_PRODUCTION" $ARGOCD_OPTS $SET_ARGS
      fi

      echo "── argocd app sync ────────────────────────────────────"
      argocd app sync "$ARGOCD_APP_PRODUCTION" $ARGOCD_OPTS --timeout 300
      argocd app wait "$ARGOCD_APP_PRODUCTION" $ARGOCD_OPTS --timeout 300 --health --sync
  rules:
    - if: $CI_COMMIT_TAG

# ── Deploy to DR (manual gate, mirrors production pinning) ───────────────────
# Promotes the same image tags to the DR cluster. Run after production is
# verified healthy. Per-app pinning follows the same BACKEND_CHANGED /
# FRONTEND_CHANGED logic as production.
deploy:dr:
  extends: .argocd_base
  stage: dr
  needs:
    - job: detect
      artifacts: true
    - job: deploy:production
      optional: true
    - job: backend:docker:build
      optional: true
    - job: frontend:docker:build
      optional: true
    - job: filebeat:docker:build
      optional: true
  when: manual
  environment:
    name: dr
    url: $DR_URL
  script:
    - |
      set -e

      SET_ARGS=""
      if [ "$BACKEND_CHANGED" = "1" ]; then
        echo "→ Pinning $BACKEND_HELM_KEY → $CI_COMMIT_TAG"
        SET_ARGS="$SET_ARGS --helm-set $BACKEND_HELM_KEY.image.tag=$CI_COMMIT_TAG"
      else
        echo "→ Backend unchanged since $PREV_TAG, leaving its image tag as-is"
      fi

      if [ "$FRONTEND_CHANGED" = "1" ]; then
        echo "→ Pinning $FRONTEND_HELM_KEY → $CI_COMMIT_TAG"
        SET_ARGS="$SET_ARGS --helm-set $FRONTEND_HELM_KEY.image.tag=$CI_COMMIT_TAG"
      else
        echo "→ Frontend unchanged since $PREV_TAG, leaving its image tag as-is"
      fi

      if [ "$FILEBEAT_CHANGED" = "1" ]; then
        echo "→ Pinning $FILEBEAT_HELM_KEY → $CI_COMMIT_TAG"
        SET_ARGS="$SET_ARGS --helm-set $FILEBEAT_HELM_KEY.image.tag=$CI_COMMIT_TAG"
      else
        echo "→ Filebeat unchanged since $PREV_TAG, leaving its image tag as-is"
      fi
      if [ "$POSTGRES_CHANGED" = "1" ]; then
        echo "→ Pinning $POSTGRES_HELM_KEY → $CI_COMMIT_TAG"
        SET_ARGS="$SET_ARGS --helm-set $POSTGRES_HELM_KEY.image.tag=$CI_COMMIT_TAG"
      else
        echo "→ Postgres unchanged since $PREV_TAG, leaving its image tag as-is"
      fi

      if [ -z "$SET_ARGS" ] && [ "$HELM_CHANGED" != "1" ]; then
        echo "Nothing to update — exiting."
        exit 0
      fi

      if [ -n "$SET_ARGS" ]; then
        echo "── argocd app set ─────────────────────────────────────"
        argocd app set "$ARGOCD_APP_DR" $ARGOCD_OPTS $SET_ARGS
      fi

      echo "── argocd app sync ────────────────────────────────────"
      argocd app sync "$ARGOCD_APP_DR" $ARGOCD_OPTS --timeout 300
      argocd app wait "$ARGOCD_APP_DR" $ARGOCD_OPTS --timeout 300 --health --sync
  rules:
    - if: $CI_COMMIT_TAG
