# =============================================================================
# GitOps — Helm validation + deploy.
# =============================================================================
# Each environment is split into two separate jobs visible in the pipeline UI:
#
#   plan:<env>   — Phases 1-3: validate, resolve image tags, print values files
#                  and deployment decision. Fast (seconds). Safe to re-run.
#   deploy:<env> — Phase 4: helm upgrade using the computed plan. Requires
#                  plan:<env> to have succeeded first.
#                  staging: auto  |  production/dr: manual gate.
#
# Artifact chain — each plan job writes a dotenv file consumed by the next job:
#
#   plan:staging    → staging-plan.env
#       FINAL_BACKEND_TAG, FINAL_FRONTEND_TAG, NO_CHANGES  (for deploy:staging)
#       STAGING_BACKEND_TAG, STAGING_FRONTEND_TAG          (for plan:production fallback)
#
#   deploy:staging  reads staging-plan.env
#
#   plan:production → production-plan.env
#       FINAL_BACKEND_TAG, FINAL_FRONTEND_TAG, NO_CHANGES  (for deploy:production)
#       PRODUCTION_BACKEND_TAG, PRODUCTION_FRONTEND_TAG    (for plan:dr fallback)
#
#   deploy:production reads production-plan.env
#
#   plan:dr         → dr-plan.env
#       FINAL_BACKEND_TAG, FINAL_FRONTEND_TAG, NO_CHANGES  (for deploy:dr)
#
#   deploy:dr       reads dr-plan.env
#
# Namespaces are pre-created in OpenShift — this pipeline does not create them.
# =============================================================================

.helm_base:
  extends: .base
  image:
    name: $HELM_IMAGE
    entrypoint: [""]
  before_script:
    - helm version
    - helm dependency build "helm/charts/$PROJECT_NAME/"

# ── Helm lint ─────────────────────────────────────────────────────────────────
helm:lint:
  extends: .helm_base
  stage: lint
  needs:
    - job: detect
      artifacts: true
  script:
    - |
      [ "$HELM_CHANGED" = "1" ] || { echo "[$(date '+%d/%m/%Y %H:%M:%S')] Helm unchanged — skipping lint."; exit 0; }
      echo "[$(date '+%d/%m/%Y %H:%M:%S')] Running helm lint on all charts..."
      for chart in "helm/charts"/*/; do
        echo "[$(date '+%d/%m/%Y %H:%M:%S')]   helm lint $chart"
        helm lint "$chart"
      done
      echo "[$(date '+%d/%m/%Y %H:%M:%S')] Lint passed."
  rules:
    - if: $CI_COMMIT_TAG

# ── Helm template validation ──────────────────────────────────────────────────
helm:template:
  extends: .helm_base
  stage: lint
  needs:
    - job: detect
      artifacts: true
  script:
    - |
      [ "$HELM_CHANGED" = "1" ] || { echo "[$(date '+%d/%m/%Y %H:%M:%S')] Helm unchanged — skipping template check."; exit 0; }
      echo "[$(date '+%d/%m/%Y %H:%M:%S')] Running helm template validation..."
      helm template "$PROJECT_NAME" "helm/charts/$PROJECT_NAME/" --debug > /dev/null
      echo "[$(date '+%d/%m/%Y %H:%M:%S')] Template check passed."
  rules:
    - if: $CI_COMMIT_TAG

# =============================================================================
# Shared scripts (YAML anchors)
# =============================================================================

# ── Plan script (Phases 1-3) ──────────────────────────────────────────────────
# Injected CI variables from dotenv artifacts:
#   BACKEND_CHANGED, FRONTEND_CHANGED, HELM_CHANGED        — from detect
#   STAGING_BACKEND_TAG, STAGING_FRONTEND_TAG              — from plan:staging (production only)
#   PRODUCTION_BACKEND_TAG, PRODUCTION_FRONTEND_TAG        — from plan:production (dr only)
# Job-level variables required:
#   DEPLOY_ENV, VALUES_FILE, DEPLOY_NAMESPACE, HELM_KUBEAPISERVER, HELM_KUBETOKEN
.plan_script: &plan_script |
  set -e

  _ts()     { date '+%d/%m/%Y %H:%M:%S'; }
  log()     { echo "[$(_ts)] $*"; }
  ok()      { echo "[$(_ts)] OK  $*"; }
  fail()    { echo "[$(_ts)] ERR $*" >&2; exit 1; }
  section() {
    echo ""
    echo "[$(_ts)] ══════════════════════════════════════════════════"
    echo "[$(_ts)]   $*"
    echo "[$(_ts)] ══════════════════════════════════════════════════"
  }

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 1/3 — Environment Setup
  # ═══════════════════════════════════════════════════════════════════════════
  section "PLAN [${DEPLOY_ENV}]  1/3 — Environment Setup"

  IMAGE_TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
  [ -n "$IMAGE_TAG" ] || fail "Cannot determine image tag — CI_COMMIT_TAG and CI_COMMIT_SHORT_SHA are both empty."

  log "Environment    : $DEPLOY_ENV"
  log "Image tag      : $IMAGE_TAG"
  log "Namespace      : $DEPLOY_NAMESPACE"
  log "Cluster API    : $HELM_KUBEAPISERVER"
  log "Chart          : helm/charts/$PROJECT_NAME/"
  log "Base values    : helm/charts/$PROJECT_NAME/values.yaml"
  log "Env values     : helm/charts/$PROJECT_NAME/$VALUES_FILE"
  log "Changed flags  : backend=$BACKEND_CHANGED  frontend=$FRONTEND_CHANGED  helm=$HELM_CHANGED"
  ok "Phase 1 complete."

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 2/3 — Tag Resolution (Helm history + cross-env promotion fallback)
  # ═══════════════════════════════════════════════════════════════════════════
  section "PLAN [${DEPLOY_ENV}]  2/3 — Tag Resolution"

  RESOLVED_BACKEND_TAG=""
  RESOLVED_FRONTEND_TAG=""

  log "Scanning Helm history for release '$PROJECT_NAME' in '$DEPLOY_NAMESPACE'..."
  GOOD_REVISIONS=$(helm history "$PROJECT_NAME" -n "$DEPLOY_NAMESPACE" --max 50 2>/dev/null \
    | grep -E '\s(deployed|superseded)\s' \
    | awk '{print $1}' | sort -rn || true)

  if [ -z "$GOOD_REVISIONS" ]; then
    log "No previous successful revision found — treating as first deploy."
  else
    log "Eligible revisions (newest first): $(echo "$GOOD_REVISIONS" | tr '\n' ' ')"
    for REV in $GOOD_REVISIONS; do
      [ -n "$RESOLVED_BACKEND_TAG" ] && [ -n "$RESOLVED_FRONTEND_TAG" ] && break
      log "  Checking revision $REV..."
      REV_VALUES=$(helm get values "$PROJECT_NAME" -n "$DEPLOY_NAMESPACE" \
        --revision "$REV" 2>/dev/null || true)
      if [ -z "$RESOLVED_BACKEND_TAG" ]; then
        RESOLVED_BACKEND_TAG=$(printf '%s\n' "$REV_VALUES" | awk '
          /^[^ ]/      { s=0 }
          /^backend:/  { s=1 }
          s==1 && /^  image:/ { s=2 }
          s==2 && /^    tag:/ { gsub(/"/,"",$2); if ($2!="") { print $2; exit } }
        ')
        [ -n "$RESOLVED_BACKEND_TAG" ]  && log "    backend tag from rev $REV: $RESOLVED_BACKEND_TAG"
      fi
      if [ -z "$RESOLVED_FRONTEND_TAG" ]; then
        RESOLVED_FRONTEND_TAG=$(printf '%s\n' "$REV_VALUES" | awk '
          /^[^ ]/       { s=0 }
          /^frontend:/  { s=1 }
          s==1 && /^  image:/ { s=2 }
          s==2 && /^    tag:/ { gsub(/"/,"",$2); if ($2!="") { print $2; exit } }
        ')
        [ -n "$RESOLVED_FRONTEND_TAG" ] && log "    frontend tag from rev $REV: $RESOLVED_FRONTEND_TAG"
      fi
    done
  fi

  # Cross-env promotion fallback (injected by plan:<upstream-env> dotenv artifact)
  if [ "$DEPLOY_ENV" = "production" ]; then
    if [ -z "$RESOLVED_BACKEND_TAG" ] && [ -n "${STAGING_BACKEND_TAG:-}" ]; then
      RESOLVED_BACKEND_TAG="$STAGING_BACKEND_TAG"
      log "No production Helm history for backend — promoted from staging: $RESOLVED_BACKEND_TAG"
    fi
    if [ -z "$RESOLVED_FRONTEND_TAG" ] && [ -n "${STAGING_FRONTEND_TAG:-}" ]; then
      RESOLVED_FRONTEND_TAG="$STAGING_FRONTEND_TAG"
      log "No production Helm history for frontend — promoted from staging: $RESOLVED_FRONTEND_TAG"
    fi
  fi
  if [ "$DEPLOY_ENV" = "dr" ]; then
    if [ -z "$RESOLVED_BACKEND_TAG" ] && [ -n "${PRODUCTION_BACKEND_TAG:-}" ]; then
      RESOLVED_BACKEND_TAG="$PRODUCTION_BACKEND_TAG"
      log "No DR Helm history for backend — promoted from production: $RESOLVED_BACKEND_TAG"
    fi
    if [ -z "$RESOLVED_FRONTEND_TAG" ] && [ -n "${PRODUCTION_FRONTEND_TAG:-}" ]; then
      RESOLVED_FRONTEND_TAG="$PRODUCTION_FRONTEND_TAG"
      log "No DR Helm history for frontend — promoted from production: $RESOLVED_FRONTEND_TAG"
    fi
  fi

  ok "Resolved — backend='${RESOLVED_BACKEND_TAG:-<none>}'  frontend='${RESOLVED_FRONTEND_TAG:-<none>}'"
  ok "Phase 2 complete."

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 3/3 — Deployment Decision + Values Preview
  # ═══════════════════════════════════════════════════════════════════════════
  section "PLAN [${DEPLOY_ENV}]  3/3 — Deployment Decision"

  FINAL_BACKEND_TAG=""
  FINAL_FRONTEND_TAG=""

  if [ "$BACKEND_CHANGED" = "1" ]; then
    FINAL_BACKEND_TAG="$IMAGE_TAG"
    log "Backend  CHANGED  → new image:  $ARTIFACTORY_REGISTRY/backend:$FINAL_BACKEND_TAG"
  elif [ -n "$RESOLVED_BACKEND_TAG" ]; then
    FINAL_BACKEND_TAG="$RESOLVED_BACKEND_TAG"
    log "Backend  unchanged → keeping:   $ARTIFACTORY_REGISTRY/backend:$FINAL_BACKEND_TAG"
  else
    fail "Cannot determine backend tag for '$DEPLOY_ENV'. No Helm history and no upstream tags. Fix: run staging first or set FORCE_BUILD."
  fi

  if [ "$FRONTEND_CHANGED" = "1" ]; then
    FINAL_FRONTEND_TAG="$IMAGE_TAG"
    log "Frontend CHANGED  → new image:  $ARTIFACTORY_REGISTRY/frontend:$FINAL_FRONTEND_TAG"
  elif [ -n "$RESOLVED_FRONTEND_TAG" ]; then
    FINAL_FRONTEND_TAG="$RESOLVED_FRONTEND_TAG"
    log "Frontend unchanged → keeping:   $ARTIFACTORY_REGISTRY/frontend:$FINAL_FRONTEND_TAG"
  else
    fail "Cannot determine frontend tag for '$DEPLOY_ENV'. No Helm history and no upstream tags. Fix: run staging first or set FORCE_BUILD."
  fi

  NO_CHANGES=0
  if [ "$BACKEND_CHANGED" != "1" ] && [ "$FRONTEND_CHANGED" != "1" ] && [ "$HELM_CHANGED" != "1" ]; then
    log "No changes in backend, frontend, or Helm chart — deploy will be a no-op."
    NO_CHANGES=1
  fi

  log ""
  log "Values files that will be applied (in order):"
  log "──── helm/charts/$PROJECT_NAME/values.yaml  (base) ─────────────────────"
  cat "helm/charts/$PROJECT_NAME/values.yaml"
  log ""
  log "──── helm/charts/$PROJECT_NAME/$VALUES_FILE  ($DEPLOY_ENV overrides) ───"
  cat "helm/charts/$PROJECT_NAME/$VALUES_FILE"
  log "─────────────────────────────────────────────────────────────────────────"

  # Write plan dotenv:
  #   FINAL_BACKEND_TAG / FINAL_FRONTEND_TAG / NO_CHANGES → consumed by deploy:<env>
  #   ${ENV_UPPER}_BACKEND_TAG / ${ENV_UPPER}_FRONTEND_TAG → consumed by plan:<next-env> fallback
  ENV_UPPER=$(printf '%s' "$DEPLOY_ENV" | tr '[:lower:]' '[:upper:]')
  {
    printf 'FINAL_BACKEND_TAG=%s\n'   "$FINAL_BACKEND_TAG"
    printf 'FINAL_FRONTEND_TAG=%s\n'  "$FINAL_FRONTEND_TAG"
    printf 'NO_CHANGES=%s\n'          "$NO_CHANGES"
    printf '%s_BACKEND_TAG=%s\n'      "$ENV_UPPER" "$FINAL_BACKEND_TAG"
    printf '%s_FRONTEND_TAG=%s\n'     "$ENV_UPPER" "$FINAL_FRONTEND_TAG"
  } > "${DEPLOY_ENV}-plan.env"

  log ""
  log "Plan written to ${DEPLOY_ENV}-plan.env:"
  cat "${DEPLOY_ENV}-plan.env"
  log ""
  ok "Plan complete. Trigger 'deploy:${DEPLOY_ENV}' to apply."

# ── Deploy apply script (Phase 4) ─────────────────────────────────────────────
# Injected CI variables from plan:<env> dotenv artifact:
#   FINAL_BACKEND_TAG, FINAL_FRONTEND_TAG, NO_CHANGES
# Job-level variables required:
#   DEPLOY_ENV, VALUES_FILE, DEPLOY_NAMESPACE, HELM_KUBEAPISERVER, HELM_KUBETOKEN
.deploy_apply_script: &deploy_apply_script |
  set -e

  _ts()     { date '+%d/%m/%Y %H:%M:%S'; }
  log()     { echo "[$(_ts)] $*"; }
  ok()      { echo "[$(_ts)] OK  $*"; }
  fail()    { echo "[$(_ts)] ERR $*" >&2; exit 1; }
  section() {
    echo ""
    echo "[$(_ts)] ══════════════════════════════════════════════════"
    echo "[$(_ts)]   $*"
    echo "[$(_ts)] ══════════════════════════════════════════════════"
  }

  section "DEPLOY [${DEPLOY_ENV}] — Helm Upgrade"

  [ -n "$FINAL_BACKEND_TAG" ]  || fail "FINAL_BACKEND_TAG is empty — plan:${DEPLOY_ENV} artifact not injected."
  [ -n "$FINAL_FRONTEND_TAG" ] || fail "FINAL_FRONTEND_TAG is empty — plan:${DEPLOY_ENV} artifact not injected."

  if [ "${NO_CHANGES:-0}" = "1" ]; then
    log "Plan indicated no changes in backend, frontend, or Helm chart — nothing to deploy."
    exit 0
  fi

  log "Release        : $PROJECT_NAME"
  log "Namespace      : $DEPLOY_NAMESPACE"
  log "Cluster API    : $HELM_KUBEAPISERVER"
  log "Backend image  : $ARTIFACTORY_REGISTRY/backend:$FINAL_BACKEND_TAG"
  log "Frontend image : $ARTIFACTORY_REGISTRY/frontend:$FINAL_FRONTEND_TAG"
  log "Values files   : values.yaml + $VALUES_FILE"
  log "Helm flags     : --wait --timeout 5m"
  log ""
  log "Running helm upgrade --install..."

  HELM_START=$(date +%s)
  set +x  # suppress command echo to keep secrets out of CI logs
  helm upgrade --install "$PROJECT_NAME" "helm/charts/$PROJECT_NAME/" \
    --namespace "$DEPLOY_NAMESPACE" \
    -f "helm/charts/$PROJECT_NAME/values.yaml" \
    -f "helm/charts/$PROJECT_NAME/$VALUES_FILE" \
    --set backend.image.repository="$ARTIFACTORY_REGISTRY/backend" \
    --set backend.image.tag="$FINAL_BACKEND_TAG" \
    --set frontend.image.repository="$ARTIFACTORY_REGISTRY/frontend" \
    --set frontend.image.tag="$FINAL_FRONTEND_TAG" \
    --wait \
    --timeout 5m
  HELM_END=$(date +%s)

  ok "Helm upgrade succeeded in $((HELM_END - HELM_START))s."
  log ""
  log "Deployment complete for $DEPLOY_ENV:"
  log "  backend  → $ARTIFACTORY_REGISTRY/backend:$FINAL_BACKEND_TAG"
  log "  frontend → $ARTIFACTORY_REGISTRY/frontend:$FINAL_FRONTEND_TAG"
  log "Pods are Ready (verified by --wait — Helm polls the cluster API until"
  log "all pods pass readiness probes or --timeout 5m is exceeded)."

# =============================================================================
# STAGING
# =============================================================================

plan:staging:
  extends: .helm_base
  stage: staging
  needs:
    - job: detect
      artifacts: true
    - job: backend:docker:build
      optional: true
      artifacts: false
    - job: frontend:docker:build
      optional: true
      artifacts: false
  environment:
    name: staging
  variables:
    DEPLOY_ENV: "staging"
    VALUES_FILE: "values-staging.yaml"
    DEPLOY_NAMESPACE: "$K8S_NAMESPACE"
    HELM_KUBEAPISERVER: "$STAGING_SERVER"
    HELM_KUBETOKEN: "$STAGING_TOKEN"
    HELM_KUBEINSECURE_SKIP_TLS_VERIFY: "true"
  script:
    - *plan_script
  artifacts:
    reports:
      dotenv: staging-plan.env
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG
    - if: $FORCE_BUILD == "1"

deploy:staging:
  extends: .helm_base
  stage: staging
  needs:
    - job: plan:staging
      artifacts: true
  environment:
    name: staging
  variables:
    DEPLOY_ENV: "staging"
    VALUES_FILE: "values-staging.yaml"
    DEPLOY_NAMESPACE: "$K8S_NAMESPACE"
    HELM_KUBEAPISERVER: "$STAGING_SERVER"
    HELM_KUBETOKEN: "$STAGING_TOKEN"
    HELM_KUBEINSECURE_SKIP_TLS_VERIFY: "true"
  script:
    - *deploy_apply_script
  rules:
    - if: $CI_COMMIT_TAG
    - if: $FORCE_BUILD == "1"

# =============================================================================
# PRODUCTION
# =============================================================================

plan:production:
  extends: .helm_base
  stage: production
  needs:
    - job: detect
      artifacts: true
    - job: plan:staging
      artifacts: true   # injects STAGING_BACKEND_TAG + STAGING_FRONTEND_TAG for first-deploy fallback
    - job: deploy:staging
      artifacts: false  # ordering: do not plan production until staging is deployed
    - job: backend:docker:build
      optional: true
      artifacts: false
    - job: frontend:docker:build
      optional: true
      artifacts: false
  environment:
    name: production
  variables:
    DEPLOY_ENV: "production"
    VALUES_FILE: "values-production.yaml"
    DEPLOY_NAMESPACE: "$K8S_NAMESPACE"
    HELM_KUBEAPISERVER: "$PROD_SERVER"
    HELM_KUBETOKEN: "$PROD_TOKEN"
    HELM_KUBEINSECURE_SKIP_TLS_VERIFY: "true"
  script:
    - *plan_script
  artifacts:
    reports:
      dotenv: production-plan.env
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG

deploy:production:
  extends: .helm_base
  stage: production
  needs:
    - job: plan:production
      artifacts: true
  when: manual
  environment:
    name: production
  variables:
    DEPLOY_ENV: "production"
    VALUES_FILE: "values-production.yaml"
    DEPLOY_NAMESPACE: "$K8S_NAMESPACE"
    HELM_KUBEAPISERVER: "$PROD_SERVER"
    HELM_KUBETOKEN: "$PROD_TOKEN"
    HELM_KUBEINSECURE_SKIP_TLS_VERIFY: "true"
  script:
    - *deploy_apply_script
  rules:
    - if: $CI_COMMIT_TAG

# =============================================================================
# DR
# =============================================================================

plan:dr:
  extends: .helm_base
  stage: dr
  needs:
    - job: detect
      artifacts: true
    - job: plan:production
      artifacts: true   # injects PRODUCTION_BACKEND_TAG + PRODUCTION_FRONTEND_TAG for first-deploy fallback
    - job: deploy:production
      optional: true    # ordering: prefer to plan DR after production is deployed (manual gate — non-blocking)
      artifacts: false
    - job: backend:docker:build
      optional: true
      artifacts: false
    - job: frontend:docker:build
      optional: true
      artifacts: false
  environment:
    name: dr
  variables:
    DEPLOY_ENV: "dr"
    VALUES_FILE: "values-dr.yaml"
    DEPLOY_NAMESPACE: "$K8S_NAMESPACE"
    HELM_KUBEAPISERVER: "$DR_SERVER"
    HELM_KUBETOKEN: "$DR_TOKEN"
    HELM_KUBEINSECURE_SKIP_TLS_VERIFY: "true"
  script:
    - *plan_script
  artifacts:
    reports:
      dotenv: dr-plan.env
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG

deploy:dr:
  extends: .helm_base
  stage: dr
  needs:
    - job: plan:dr
      artifacts: true
  when: manual
  environment:
    name: dr
  variables:
    DEPLOY_ENV: "dr"
    VALUES_FILE: "values-dr.yaml"
    DEPLOY_NAMESPACE: "$K8S_NAMESPACE"
    HELM_KUBEAPISERVER: "$DR_SERVER"
    HELM_KUBETOKEN: "$DR_TOKEN"
    HELM_KUBEINSECURE_SKIP_TLS_VERIFY: "true"
  script:
    - *deploy_apply_script
  rules:
    - if: $CI_COMMIT_TAG
