stages:
  - verify
  - build
  - staging
  - prod
  - dr
  - cleanup

variables:
  # Artifactory container base images (preferred pins):
  # - docker-virtual/python:3.12-slim
  # - docker-virtual/node:22
  # - docker-virtual/docker:27
  PYTHON_IMAGE: "python:3.12-slim"
  NODE_IMAGE: "node:22"
  # Set these in GitLab CI/CD variables for private-network package resolution.
  # Example values:
  # - PIP_INDEX_URL=https://artifactory.example.local/api/pypi/pypi/simple
  # - NPM_CONFIG_REGISTRY=https://artifactory.example.local/api/npm/npm/
  PIP_INDEX_URL: ""
  NPM_CONFIG_REGISTRY: ""
  # Kaniko executor images (override with Artifactory-hosted builds, e.g. python- or node-oriented variants).
  KANIKO_IMAGE_BACKEND: "gcr.io/kaniko-project/executor:v1.23.2-debug"
  KANIKO_IMAGE_FRONTEND: "gcr.io/kaniko-project/executor:v1.23.2-debug"
  # Artifactory Docker push: host (with port if any) matching the hostname part of `--destination`, e.g. acme.jfrog.io
  # (JFrog Docker access URLs vary; the Kaniko docker config.json auth key usually matches this hostname unless you need an https:// prefix — see Kaniko/JFrog docs.)
  ARTIFACTORY_DOCKER_REGISTRY: ""
  # Path after the hostname (no leading/trailing slash), e.g. docker-virtual/my-product → image backend tag lives at ARTIFACTORY_DOCKER_REGISTRY/docker-virtual/my-product/backend:TAG
  ARTIFACTORY_DOCKER_REPO_PATH: ""
  # Optional: set to "true" if the registry uses a private CA that is not in the default trust store.
  KANIKO_SKIP_TLS_VERIFY: "false"
  # Branches/ref in downstream Helm / Argo repos (multi-project triggers). Override in CI/CD vars if needed.
  HELM_CHART_TARGET_BRANCH: $CI_COMMIT_REF_NAME
  ARGO_APPS_TARGET_BRANCH: $CI_COMMIT_REF_NAME
  # Ensure diff base/target SHAs are available for change detection.
  GIT_DEPTH: "0"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

.kaniko_registry_auth:
  before_script:
    - |
      if [ -z "$ARTIFACTORY_DOCKER_REGISTRY" ] || [ -z "$ARTIFACTORY_DOCKER_REPO_PATH" ]; then
        echo "Set CI/CD variables ARTIFACTORY_DOCKER_REGISTRY and ARTIFACTORY_DOCKER_REPO_PATH for Kaniko push."
        exit 1
      fi
      if [ -z "$ARTIFACTORY_DOCKER_USER" ] || [ -z "$ARTIFACTORY_DOCKER_PASSWORD" ]; then
        echo "Set CI/CD variables ARTIFACTORY_DOCKER_USER and ARTIFACTORY_DOCKER_PASSWORD for Kaniko registry auth."
        exit 1
      fi
    - mkdir -p /kaniko/.docker
    - |
      printf '%s' "{\"auths\":{\"${ARTIFACTORY_DOCKER_REGISTRY}\":{\"auth\":\"$(printf '%s:%s' "${ARTIFACTORY_DOCKER_USER}" "${ARTIFACTORY_DOCKER_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
