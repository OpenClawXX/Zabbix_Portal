# =============================================================================
# Reusable job templates — shared across all pipeline jobs.
# All project-specific variables are set in GitLab Settings → CI/CD → Variables.
# =============================================================================

.base:
  interruptible: true
  tags:
    - docker  # replace with your GitLab runner tag

.docker_base:
  extends: .base
  image:
    name: <your-kaniko-image>  # PRIVATE NETWORK: replace with your internal Kaniko image (e.g. your-registry/kaniko:latest)
    entrypoint: [""]
