stages:
  - verify
  - build
  - staging_publish
  - prod_publish

variables:
  # Artifactory container base images (preferred pins):
  # - docker-virtual/python:3.12-slim
  # - docker-virtual/node:22
  # - docker-virtual/docker:27
  PYTHON_IMAGE: "python:3.12-slim"
  NODE_IMAGE: "node:22"
  DOCKER_BUILDKIT: "1"
  # Set these in GitLab CI/CD variables for private-network package resolution.
  # Example values:
  # - PIP_INDEX_URL=https://artifactory.example.local/api/pypi/pypi/simple
  # - NPM_CONFIG_REGISTRY=https://artifactory.example.local/api/npm/npm/
  PIP_INDEX_URL: ""
  NPM_CONFIG_REGISTRY: ""
  # Ensure diff base/target SHAs are available for change detection.
  GIT_DEPTH: "0"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

.docker_job:
  # Change to your Artifactory Docker image proxy, example:
  # image: "artifactory.example.local/docker-virtual/docker:27"
  image: docker:27
  services:
    # Change to matching dind image from Artifactory:
    # - artifactory.example.local/docker-virtual/docker:27-dind
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
