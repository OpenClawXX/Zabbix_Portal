# =============================================================================
# PostgreSQL image build — runs only when apps/postgres/ changes.
# =============================================================================

postgres:docker:build:
  extends: .docker_base
  stage: build
  needs:
    - job: detect
      artifacts: true
  script:
    - |
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}/${POSTGRES_PATH}" \
        --dockerfile "${CI_PROJECT_DIR}/${POSTGRES_PATH}/Dockerfile" \
        --destination "${POSTGRES_IMAGE}:${CI_COMMIT_TAG}" \
        --destination "${POSTGRES_IMAGE}:latest" \
        --cache=true \
        --cache-repo "${POSTGRES_IMAGE}/cache" \
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}" \
        --label "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
        --label "org.opencontainers.image.version=${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG && $POSTGRES_CHANGED == "1"
