# =============================================================================
# Change detection — runs once per pipeline, in the .pre stage.
# =============================================================================
# Determines which apps changed BETWEEN THE PREVIOUS TAG AND THIS ONE so that
# only the modified apps are rebuilt and re-deployed.
#
# This pipeline runs only on tag pushes (see common.yml .rules_release), so
# the comparison base is always the most recent ancestor tag — never HEAD~1
# or a branch SHA.
#
# Outputs (consumed by python.yml, node.yml, gitops.yml):
#   BACKEND_CHANGED   = "1" if anything under apps/backend/ changed
#   FRONTEND_CHANGED  = "1" if anything under apps/frontend/ or root JS config changed
#   HELM_CHANGED      = "1" if anything under helm/ changed
#   PREV_TAG          = the tag we diffed against (empty on first-ever release)
# =============================================================================

detect:
  extends: .base
  image: alpine/git:2.43.0  # pinned — mutable :latest breaks reproducibility
  stage: .pre
  variables:
    GIT_DEPTH: 0   # full history needed to find ancestor tags
  script:
    - |
      set -e

      # The most recent annotated/lightweight tag that is an ancestor of this
      # one — i.e. the previous release. May be empty on the first tag ever.
      PREV_TAG=$(git describe --tags --abbrev=0 "${CI_COMMIT_TAG}^" 2>/dev/null || echo "")

      echo "── Tag diff base ─────────────────────────────────────"
      echo "Current tag : $CI_COMMIT_TAG"
      echo "Previous tag: ${PREV_TAG:-<none>}"
      echo "──────────────────────────────────────────────────────"

      BACKEND_CHANGED=0
      FRONTEND_CHANGED=0
      HELM_CHANGED=0

      if [ -n "$FORCE_BUILD" ] && [ "$FORCE_BUILD" != "0" ]; then
        echo "→ FORCE_BUILD=1: marking all apps as changed."
        BACKEND_CHANGED=1
        FRONTEND_CHANGED=1
        HELM_CHANGED=1
      elif [ -z "$PREV_TAG" ]; then
        # First tag — there is no prior release to diff against.
        # Treat everything as new so all apps build and deploy.
        echo "→ First tag: marking all apps as changed."
        BACKEND_CHANGED=1
        FRONTEND_CHANGED=1
        HELM_CHANGED=1
      else
        CHANGED=$(git diff --name-only "$PREV_TAG" "$CI_COMMIT_TAG")

        echo "── Files changed since $PREV_TAG ─────────────────────"
        echo "$CHANGED"
        echo "──────────────────────────────────────────────────────"

        echo "$CHANGED" | grep -q "^apps/backend/"  && BACKEND_CHANGED=1
        echo "$CHANGED" | grep -q "^apps/frontend/" && FRONTEND_CHANGED=1

        # Root workspace config files that affect all frontend builds.
        echo "$CHANGED" | grep -qE "^(package\.json|package-lock\.json|biome\.json|\.npmrc)$" && FRONTEND_CHANGED=1

        # Helm chart changes — anything under helm/charts
        echo "$CHANGED" | grep -q "^helm/charts/" && HELM_CHANGED=1
      fi

      {
        echo "BACKEND_CHANGED=$BACKEND_CHANGED"
        echo "FRONTEND_CHANGED=$FRONTEND_CHANGED"
        echo "HELM_CHANGED=$HELM_CHANGED"
        echo "PREV_TAG=$PREV_TAG"
      } > detect.env

      echo "── Detection result ──────────────────────────────────"
      cat detect.env
      echo "──────────────────────────────────────────────────────"
  artifacts:
    reports:
      dotenv: detect.env
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG
    - if: $FORCE_BUILD  # allow manual force-deploy from any branch

# ── Variable validation ───────────────────────────────────────────────────────
# Prints all pipeline variables at the start of every run so you can verify
# their values in the job log. Sensitive variables (tokens, passwords) are
# only checked for presence — their values are never printed.
validate:variables:
  extends: .base
  stage: .pre
  image:
    name: alpine:3.20  # pinned — PRIVATE NETWORK: replace with your internal alpine image
    entrypoint: [""]
  script:
    - |
      echo "══════════════════════════════════════════════════════"
      echo "  Pipeline variable validation"
      echo "══════════════════════════════════════════════════════"

      echo ""
      echo "── Project ───────────────────────────────────────────"
      echo "  PROJECT_NAME         = $PROJECT_NAME"
      echo "  CI_COMMIT_TAG        = $CI_COMMIT_TAG"
      echo "  FORCE_BUILD          = $FORCE_BUILD"

      echo ""
      echo "── Namespace ─────────────────────────────────────────"
      echo "  K8S_NAMESPACE        = $K8S_NAMESPACE"

      # DELETED: ARTIFACTORY_REGISTRY block removed — registry is now hardcoded
      # in python.yml (Kaniko --destination) and gitops.yml (helm --set image.repository).
      # Replace <your-artifactory-registry> in those files with your actual registry path.

      echo ""
      echo "── Cluster servers ───────────────────────────────────"
      echo "  STAGING_SERVER       = $STAGING_SERVER"
      echo "  PROD_SERVER          = $PROD_SERVER"

      echo ""
      echo "── Cluster tokens ────────────────────────────────────"
      echo "  STAGING_TOKEN        = $([ -n "$STAGING_TOKEN" ] && echo '*** (set)' || echo '!!! NOT SET')"
      echo "  PROD_TOKEN           = $([ -n "$PROD_TOKEN" ] && echo '*** (set)' || echo '!!! NOT SET')"

      echo ""
      echo "── Environment URLs ──────────────────────────────────"
      echo "  STAGING_URL          = $STAGING_URL"
      echo "  PRODUCTION_URL       = $PRODUCTION_URL"
      echo "  DR_URL               = $DR_URL"

      echo ""
      echo "══════════════════════════════════════════════════════"

      # Hard-fail if any critical variable is missing.
      # This surfaces misconfiguration early with a clear error instead of a
      # cryptic Helm auth failure or image-pull error later in the pipeline.
      MISSING=0
      for VAR in K8S_NAMESPACE STAGING_SERVER PROD_SERVER STAGING_TOKEN PROD_TOKEN; do
        # DELETED: ARTIFACTORY_REGISTRY removed from this list — registry is hardcoded
        eval "VAL=\${$VAR:-}"
        if [ -z "$VAL" ]; then
          echo "ERROR: required CI variable '$VAR' is not set."
          MISSING=1
        fi
      done
      [ "$MISSING" = "0" ] || exit 1
  rules:
    - if: $CI_COMMIT_TAG
