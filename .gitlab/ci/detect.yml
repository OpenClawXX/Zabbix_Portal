# =============================================================================
# Change detection — runs once per pipeline, in the .pre stage.
# =============================================================================
# Determines which apps changed BETWEEN THE PREVIOUS TAG AND THIS ONE so that
# only the modified apps are rebuilt and re-deployed.
#
# This pipeline runs only on tag pushes (see common.yml .rules_release), so
# the comparison base is always the most recent ancestor tag — never HEAD~1
# or a branch SHA.
#
# Outputs (consumed by python.yml, node.yml, elastic.yml, gitops.yml):
#   BACKEND_CHANGED   = "1" if anything under $BACKEND_PATH changed
#   FRONTEND_CHANGED  = "1" if anything under $FRONTEND_PATH or root JS config changed
#   FILEBEAT_CHANGED  = "1" if anything under $FILEBEAT_PATH changed
#   HELM_CHANGED      = "1" if anything under helm/ changed
#   PREV_TAG          = the tag we diffed against (empty on first-ever release)
# =============================================================================

detect:
  extends: .base
  image: alpine/git:latest
  stage: .pre
  variables:
    GIT_DEPTH: 0   # full history needed to find ancestor tags
  script:
    - |
      set -e

      # The most recent annotated/lightweight tag that is an ancestor of this
      # one — i.e. the previous release. May be empty on the first tag ever.
      PREV_TAG=$(git describe --tags --abbrev=0 "${CI_COMMIT_TAG}^" 2>/dev/null || echo "")

      echo "── Tag diff base ─────────────────────────────────────"
      echo "Current tag : $CI_COMMIT_TAG"
      echo "Previous tag: ${PREV_TAG:-<none>}"
      echo "──────────────────────────────────────────────────────"

      BACKEND_CHANGED=0
      FRONTEND_CHANGED=0
      FILEBEAT_CHANGED=0
      POSTGRES_CHANGED=0
      HELM_CHANGED=0

      if [ -z "$PREV_TAG" ]; then
        # First tag — there is no prior release to diff against.
        # Treat everything as new so all apps build and deploy.
        echo "→ First tag: marking all apps as changed."
        BACKEND_CHANGED=1
        FRONTEND_CHANGED=1
        FILEBEAT_CHANGED=1
        POSTGRES_CHANGED=1
        HELM_CHANGED=1
      else
        CHANGED=$(git diff --name-only "$PREV_TAG" "$CI_COMMIT_TAG")

        echo "── Files changed since $PREV_TAG ─────────────────────"
        echo "$CHANGED"
        echo "──────────────────────────────────────────────────────"

        echo "$CHANGED" | grep -q "^${BACKEND_PATH}/"  && BACKEND_CHANGED=1
        echo "$CHANGED" | grep -q "^${FRONTEND_PATH}/" && FRONTEND_CHANGED=1
        echo "$CHANGED" | grep -q "^${FILEBEAT_PATH}/" && FILEBEAT_CHANGED=1
        echo "$CHANGED" | grep -q "^${POSTGRES_PATH}/" && POSTGRES_CHANGED=1

        # Root workspace config files that affect all frontend builds.
        # Update ROOT_JS_CONFIGS in common.yml if you change the toolchain.
        echo "$CHANGED" | grep -qE "^(${ROOT_JS_CONFIGS})$" && FRONTEND_CHANGED=1

        # Helm chart changes — anything under $HELM_PATH
        echo "$CHANGED" | grep -q "^${HELM_PATH}/" && HELM_CHANGED=1
      fi

      {
        echo "BACKEND_CHANGED=$BACKEND_CHANGED"
        echo "FRONTEND_CHANGED=$FRONTEND_CHANGED"
        echo "FILEBEAT_CHANGED=$FILEBEAT_CHANGED"
        echo "POSTGRES_CHANGED=$POSTGRES_CHANGED"
        echo "HELM_CHANGED=$HELM_CHANGED"
        echo "PREV_TAG=$PREV_TAG"
      } > detect.env

      echo "── Detection result ──────────────────────────────────"
      cat detect.env
      echo "──────────────────────────────────────────────────────"
  artifacts:
    reports:
      dotenv: detect.env
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG
