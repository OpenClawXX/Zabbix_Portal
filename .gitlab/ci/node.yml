verify_node:
  stage: verify
  # Change to Artifactory mirror for Node image:
  # image: "artifactory.example.local/docker-virtual/node:22"
  image: $NODE_IMAGE
  needs: ["detect_changed_languages"]
  rules:
    - if: $NODE_CHANGED == "true"
      when: on_success
    - when: never
  cache:
    key: "npm-${CI_COMMIT_REF_SLUG}"
    paths:
      - .npm/
  script:
    - cd frontend
    # npm registry should point to Artifactory NPM (recommended npm 10.9.x with Node 22):
    # npm config set registry https://artifactory.example.local/api/npm/npm/
    - npm ci --cache ../.npm --prefer-offline
    - npm run lint

build_frontend_image:
  stage: build
  extends: .kaniko_registry_auth
  image:
    name: $KANIKO_IMAGE_FRONTEND
    entrypoint: [""]
  needs: ["verify_node", "detect_changed_languages"]
  rules:
    - if: $NODE_CHANGED == "true"
      when: on_success
    - when: never
  script:
    - |
      DEST="${ARTIFACTORY_DOCKER_REGISTRY}/${ARTIFACTORY_DOCKER_REPO_PATH}/frontend:${CI_COMMIT_SHORT_SHA}"
      EXTRA=""
      if [ "$KANIKO_SKIP_TLS_VERIFY" = "true" ]; then
        EXTRA="${EXTRA} --skip-tls-verify"
      fi
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}/frontend" \
        --dockerfile "${CI_PROJECT_DIR}/frontend/Dockerfile" \
        --destination "$DEST" \
        --compressed-caching=false \
        $EXTRA
