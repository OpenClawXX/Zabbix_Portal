# =============================================================================
# Frontend (Node.js / npm / Biome) pipeline.
# =============================================================================
# Runs only on tag pushes (see common.yml .rules_release).
# Each job is additionally gated by detect.yml FRONTEND_CHANGED flag.
# =============================================================================

.frontend_base:
  extends: .base
  image: node:${NODE_VERSION}-alpine
  needs:
    - job: detect
      artifacts: true
  before_script:
    - cd $FRONTEND_PATH
    - npm ci
  cache:
    key:
      files:
        - $FRONTEND_PATH/package-lock.json
    paths:
      - $FRONTEND_PATH/node_modules/

# ── Lint (Biome) ──────────────────────────────────────────────────────────────
frontend:lint:
  extends: .frontend_base
  stage: lint
  script:
    - npm run lint
  rules:
    - if: $CI_COMMIT_TAG && $FRONTEND_CHANGED == "1"

# ── Type-check (tsc) ──────────────────────────────────────────────────────────
frontend:typecheck:
  extends: .frontend_base
  stage: lint
  script:
    - npm run typecheck
  rules:
    - if: $CI_COMMIT_TAG && $FRONTEND_CHANGED == "1"

# ── Build & push Docker image ─────────────────────────────────────────────────
# The Dockerfile runs npm ci + next build internally — no pre-build step needed.
frontend:docker:build:
  extends: .docker_base
  stage: build
  needs:
    - job: detect
      artifacts: true
    - job: frontend:lint
      optional: true
    - job: frontend:typecheck
      optional: true
  script:
    - |
      /kaniko/executor \
        --context "$CI_PROJECT_DIR/" \
        --dockerfile "$CI_PROJECT_DIR/$FRONTEND_PATH/Dockerfile" \
        --destination "$FRONTEND_IMAGE:$CI_COMMIT_TAG" \
        --destination "$FRONTEND_IMAGE:latest" \
        --cache=true \
        --cache-repo "$FRONTEND_IMAGE/cache" \
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA" \
        --label "org.opencontainers.image.version=$CI_COMMIT_TAG" \
        --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      echo "FRONTEND_IMAGE_TAG=$CI_COMMIT_TAG" > build-frontend.env
  artifacts:
    reports:
      dotenv: build-frontend.env
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG && $FRONTEND_CHANGED == "1"
