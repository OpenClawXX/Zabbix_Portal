# =============================================================================
# Frontend (Node.js / npm / Biome) pipeline.
# =============================================================================

.frontend_base:
  extends: .base
  image: $NODE_IMAGE
  needs:
    - job: detect
      artifacts: true
  before_script:
    - cd apps/frontend
    - npm ci
  cache:
    key:
      files:
        - apps/frontend/package-lock.json
    paths:
      - apps/frontend/node_modules/

# ── Lint (Biome) ──────────────────────────────────────────────────────────────
frontend:lint:
  extends: .frontend_base
  stage: lint
  allow_failure: true
  script:
    - |
      [ "$FRONTEND_CHANGED" = "1" ] || { echo "[$(date '+%H:%M:%S')] Frontend unchanged — skipping lint."; exit 0; }
      echo "[$(date '+%H:%M:%S')] Running Biome lint..."
      npm run lint
      echo "[$(date '+%H:%M:%S')] Lint passed."
  rules:
    - if: $CI_COMMIT_TAG

# ── Type-check (tsc) ──────────────────────────────────────────────────────────
frontend:typecheck:
  extends: .frontend_base
  stage: lint
  allow_failure: true
  script:
    - |
      [ "$FRONTEND_CHANGED" = "1" ] || { echo "[$(date '+%H:%M:%S')] Frontend unchanged — skipping typecheck."; exit 0; }
      echo "[$(date '+%H:%M:%S')] Running tsc type check..."
      npm run typecheck
      echo "[$(date '+%H:%M:%S')] Type check passed."
  rules:
    - if: $CI_COMMIT_TAG

# ── Build & push Docker image ─────────────────────────────────────────────────
frontend:docker:build:
  extends: .docker_base
  stage: build
  needs:
    - job: detect
      artifacts: true
    - job: frontend:lint
      optional: true
    - job: frontend:typecheck
      optional: true
  script:
    - |
      # Always write the env file so the artifact upload never fails on "no files to upload"
      echo "FRONTEND_IMAGE_TAG=" > build-frontend.env
      [ "$FRONTEND_CHANGED" = "1" ] || { echo "[$(date '+%H:%M:%S')] Frontend unchanged — skipping build."; exit 0; }
      IMAGE_TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"  # tag push → release tag; FORCE_BUILD from branch → short SHA
      echo "[$(date '+%H:%M:%S')] Building frontend image tag=$IMAGE_TAG..."
      /kaniko/executor \
        --use-new-run \
        --context "$CI_PROJECT_DIR/apps/frontend/" \
        --dockerfile "$CI_PROJECT_DIR/apps/frontend/Dockerfile" \
        --destination "$ARTIFACTORY_REGISTRY/frontend:$IMAGE_TAG" \
        --insecure-pull \
        --skip-tls-verify \
        --snapshotMode=time \
        --compressed-caching=false \
        --cache-ttl=1440h0m0s \
        --cache=true \
        --force
      echo "[$(date '+%H:%M:%S')] Frontend image pushed: $ARTIFACTORY_REGISTRY/frontend:$IMAGE_TAG"
      echo "FRONTEND_IMAGE_TAG=$IMAGE_TAG" > build-frontend.env
  artifacts:
    reports:
      dotenv: build-frontend.env
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG =~ /^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)/
    - if: $FORCE_BUILD == "1"  # allow manual force-build from any branch
