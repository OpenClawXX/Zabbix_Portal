# =============================================================================
# Frontend (Node.js / npm / Biome) pipeline.
# =============================================================================

.frontend_base:
  extends: .base
  image: <your-node-image>  # PRIVATE NETWORK: replace with your internal Node image (e.g. your-registry/node:22-alpine)
  needs:
    - job: detect
      artifacts: true
  before_script:
    - cd apps/frontend
    - npm ci
  cache:
    key:
      files:
        - apps/frontend/package-lock.json
    paths:
      - apps/frontend/node_modules/

# ── Lint (Biome) ──────────────────────────────────────────────────────────────
frontend:lint:
  extends: .frontend_base
  stage: lint
  allow_failure: true
  script:
    - |
      [ "$FRONTEND_CHANGED" = "1" ] || { echo "Frontend unchanged — skipping lint."; exit 0; }
      npm run lint
  rules:
    - if: $CI_COMMIT_TAG

# ── Type-check (tsc) ──────────────────────────────────────────────────────────
frontend:typecheck:
  extends: .frontend_base
  stage: lint
  allow_failure: true
  script:
    - |
      [ "$FRONTEND_CHANGED" = "1" ] || { echo "Frontend unchanged — skipping typecheck."; exit 0; }
      npm run typecheck
  rules:
    - if: $CI_COMMIT_TAG

# ── Build & push Docker image ─────────────────────────────────────────────────
frontend:docker:build:
  extends: .docker_base
  stage: build
  needs:
    - job: detect
      artifacts: true
    - job: frontend:lint
      optional: true
    - job: frontend:typecheck
      optional: true
  script:
    - |
      [ "$FRONTEND_CHANGED" = "1" ] || { echo "Frontend unchanged — skipping build."; exit 0; }
      IMAGE_TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"  # tag push → release tag; FORCE_BUILD from branch → short SHA
      # DELETED: --destination used to be "$ARTIFACTORY_REGISTRY/frontend:$IMAGE_TAG"
      # ARTIFACTORY_REGISTRY variable removed — registry is now hardcoded below.
      # Replace <your-artifactory-registry> with your actual registry path.
      /kaniko/executor \
        --use-new-run \
        --context "$CI_PROJECT_DIR/apps/frontend/" \
        --dockerfile "$CI_PROJECT_DIR/apps/frontend/Dockerfile" \
        --destination "<your-artifactory-registry>/frontend:$IMAGE_TAG" \
        --insecure-pull \
        --skip-tls-verify \
        --cache-ttl=1440h0m0s \
        --cache=true \
        --force
      echo "FRONTEND_IMAGE_TAG=$IMAGE_TAG" > build-frontend.env
  artifacts:
    reports:
      dotenv: build-frontend.env
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG =~ /^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)/
    - if: $FORCE_BUILD  # allow manual force-build from any branch
