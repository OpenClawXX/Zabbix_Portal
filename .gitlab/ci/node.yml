# =============================================================================
# Frontend (Node.js / npm / Biome) pipeline.
# =============================================================================

.frontend_base:
  extends: .base
  image: <your-node-image>  # PRIVATE NETWORK: replace with your internal Node image (e.g. your-registry/node:22-alpine)
  needs:
    - job: detect
      artifacts: true
  before_script:
    - cd apps/frontend
    - npm ci
  cache:
    key:
      files:
        - apps/frontend/package-lock.json
    paths:
      - apps/frontend/node_modules/

# ── Lint (Biome) ──────────────────────────────────────────────────────────────
frontend:lint:
  extends: .frontend_base
  stage: lint
  allow_failure: true
  script:
    - |
      [ "$FRONTEND_CHANGED" = "1" ] || { echo "Frontend unchanged — skipping lint."; exit 0; }
      npm run lint
  rules:
    - if: $CI_COMMIT_TAG

# ── Type-check (tsc) ──────────────────────────────────────────────────────────
frontend:typecheck:
  extends: .frontend_base
  stage: lint
  allow_failure: true
  script:
    - |
      [ "$FRONTEND_CHANGED" = "1" ] || { echo "Frontend unchanged — skipping typecheck."; exit 0; }
      npm run typecheck
  rules:
    - if: $CI_COMMIT_TAG

# ── Build & push Docker image ─────────────────────────────────────────────────
frontend:docker:build:
  extends: .docker_base
  stage: build
  needs:
    - job: detect
      artifacts: true
    - job: frontend:lint
      optional: true
    - job: frontend:typecheck
      optional: true
  script:
    - |
      [ "$FRONTEND_CHANGED" = "1" ] || { echo "Frontend unchanged — skipping build."; exit 0; }
      /kaniko/executor \
        --use-new-run \
        --context "$CI_PROJECT_DIR/" \
        --dockerfile "$CI_PROJECT_DIR/apps/frontend/Dockerfile" \
        --destination "$ARTIFACTORY_REGISTRY/frontend:$CI_COMMIT_TAG" \
        --insecure-pull \
        --skip-tls-verify \
        --cache-ttl=1440h0m0s \
        --cache=true \
        --force
      echo "FRONTEND_IMAGE_TAG=$CI_COMMIT_TAG" > build-frontend.env
  artifacts:
    reports:
      dotenv: build-frontend.env
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG =~ /^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)/
