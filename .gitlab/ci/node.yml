verify_node:
  stage: verify
  # Change to Artifactory mirror for Node image:
  # image: "artifactory.example.local/docker-virtual/node:22"
  image: $NODE_IMAGE
  needs: ["detect_changed_languages"]
  rules:
    - if: $NODE_CHANGED == "true"
      when: on_success
    - when: never
  cache:
    key: "npm-${CI_COMMIT_REF_SLUG}"
    paths:
      - .npm/
  script:
    - cd frontend
    # npm registry should point to Artifactory NPM (recommended npm 10.9.x with Node 22):
    # npm config set registry https://artifactory.example.local/api/npm/npm/
    - npm ci --cache ../.npm --prefer-offline
    - npm run lint

build_frontend_image:
  stage: build
  extends: .docker_job
  needs: ["verify_node", "detect_changed_languages"]
  rules:
    - if: $NODE_CHANGED == "true"
      when: on_success
    - when: never
  script:
    - docker build -f frontend/Dockerfile -t "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA" ./frontend
    - docker save "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA" -o frontend-image.tar
  artifacts:
    paths:
      - frontend-image.tar
    expire_in: 1 day

publish_staging_frontend:
  stage: staging_publish
  extends: .docker_job
  needs:
    - build_frontend_image
    - detect_changed_languages
  rules:
    - if: $CI_COMMIT_BRANCH == "develop" && $NODE_CHANGED == "true"
      when: on_success
    - when: never
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker load -i frontend-image.tar
    - docker tag "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE/frontend:staging"
    - docker push "$CI_REGISTRY_IMAGE/frontend:staging"
    - docker push "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA"

publish_prod_frontend:
  stage: prod_publish
  extends: .docker_job
  needs:
    - build_frontend_image
    - detect_changed_languages
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $NODE_CHANGED == "true"
      when: manual
      allow_failure: false
    - if: $CI_COMMIT_TAG && $NODE_CHANGED == "true"
      when: manual
      allow_failure: false
    - when: never
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker load -i frontend-image.tar
    - docker tag "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE/frontend:latest"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_TAG"
      fi
    - docker push "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/frontend:latest"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker push "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_TAG"
      fi
