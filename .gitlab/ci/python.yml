# =============================================================================
# Backend (Python / FastAPI) pipeline.
# =============================================================================

.backend_base:
  extends: .base
  image: <your-python-image>  # PRIVATE NETWORK: replace with your internal Python image (e.g. your-registry/python:3.12-slim)
  needs:
    - job: detect
      artifacts: true

# ── Lint (ruff) ───────────────────────────────────────────────────────────────
backend:lint:
  extends: .backend_base
  stage: lint
  allow_failure: true
  before_script:
    - pip install --no-cache-dir ruff
  script:
    - |
      [ "$BACKEND_CHANGED" = "1" ] || { echo "Backend unchanged — skipping lint."; exit 0; }
      cd apps/backend
      ruff check .
      ruff format --check .
  rules:
    - if: $CI_COMMIT_TAG

# ── Type-check (mypy) ─────────────────────────────────────────────────────────
backend:typecheck:
  extends: .backend_base
  stage: lint
  allow_failure: true
  before_script:
    - pip install --no-cache-dir mypy
    - pip install --no-cache-dir -r apps/backend/requirements.txt
  script:
    - |
      [ "$BACKEND_CHANGED" = "1" ] || { echo "Backend unchanged — skipping typecheck."; exit 0; }
      cd apps/backend
      mypy . --ignore-missing-imports
  rules:
    - if: $CI_COMMIT_TAG

# ── Build & push Docker image ─────────────────────────────────────────────────
backend:docker:build:
  extends: .docker_base
  stage: build
  needs:
    - job: detect
      artifacts: true
    - job: backend:lint
      optional: true
  tags:
    - shared-runner
  script:
    - |
      [ "$BACKEND_CHANGED" = "1" ] || { echo "Backend unchanged — skipping build."; exit 0; }
      /kaniko/executor \
        --use-new-run \
        --context "$CI_PROJECT_DIR/apps/backend/" \
        --dockerfile "$CI_PROJECT_DIR/apps/backend/Dockerfile" \
        --destination "$ARTIFACTORY_REGISTRY/backend:$CI_COMMIT_TAG" \
        --insecure-pull \
        --skip-tls-verify \
        --cache-ttl=1440h0m0s \
        --cache=true \
        --force
      echo "BACKEND_IMAGE_TAG=$CI_COMMIT_TAG" > build-backend.env
  artifacts:
    reports:
      dotenv: build-backend.env
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG =~ /^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)/
