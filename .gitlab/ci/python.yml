# =============================================================================
# Backend (Python / FastAPI) pipeline.
# =============================================================================

.backend_base:
  extends: .base
  image: $PYTHON_IMAGE
  needs:
    - job: detect
      artifacts: true

# ── Lint (ruff) ───────────────────────────────────────────────────────────────
backend:lint:
  extends: .backend_base
  stage: lint
  allow_failure: true
  before_script:
    - pip install --no-cache-dir ruff
  script:
    - |
      [ "$BACKEND_CHANGED" = "1" ] || { echo "[$(date '+%H:%M:%S')] Backend unchanged — skipping lint."; exit 0; }
      echo "[$(date '+%H:%M:%S')] Running ruff lint + format check..."
      cd apps/backend
      ruff check .
      ruff format --check .
      echo "[$(date '+%H:%M:%S')] Lint passed."
  rules:
    - if: $CI_COMMIT_TAG

# ── Type-check (mypy) ─────────────────────────────────────────────────────────
backend:typecheck:
  extends: .backend_base
  stage: lint
  allow_failure: true
  before_script:
    - pip install --no-cache-dir mypy
    - pip install --no-cache-dir -r apps/backend/requirements.txt
  script:
    - |
      [ "$BACKEND_CHANGED" = "1" ] || { echo "[$(date '+%H:%M:%S')] Backend unchanged — skipping typecheck."; exit 0; }
      echo "[$(date '+%H:%M:%S')] Running mypy type check..."
      cd apps/backend
      mypy . --ignore-missing-imports
      echo "[$(date '+%H:%M:%S')] Type check passed."
  rules:
    - if: $CI_COMMIT_TAG

# ── Build & push Docker image ─────────────────────────────────────────────────
backend:docker:build:
  extends: .docker_base
  stage: build
  needs:
    - job: detect
      artifacts: true
    - job: backend:lint
      optional: true
    - job: backend:typecheck
      optional: true
  script:
    - |
      # Always write the env file so the artifact upload never fails on "no files to upload"
      echo "BACKEND_IMAGE_TAG=" > build-backend.env
      [ "$BACKEND_CHANGED" = "1" ] || { echo "[$(date '+%H:%M:%S')] Backend unchanged — skipping build."; exit 0; }
      IMAGE_TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"  # tag push → release tag; FORCE_BUILD from branch → short SHA
      echo "[$(date '+%H:%M:%S')] Building backend image tag=$IMAGE_TAG..."
      /kaniko/executor \
        --use-new-run \
        --context "$CI_PROJECT_DIR/apps/backend/" \
        --dockerfile "$CI_PROJECT_DIR/apps/backend/Dockerfile" \
        --destination "$ARTIFACTORY_REGISTRY/backend:$IMAGE_TAG" \
        --insecure-pull \
        --skip-tls-verify \
        --snapshotMode=time \
        --compressed-caching=false \
        --cache-ttl=1440h0m0s \
        --cache=true \
        --ignore-path=/var \
        --force
      echo "[$(date '+%H:%M:%S')] Backend image pushed: $ARTIFACTORY_REGISTRY/backend:$IMAGE_TAG"
      echo "BACKEND_IMAGE_TAG=$IMAGE_TAG" > build-backend.env
  artifacts:
    reports:
      dotenv: build-backend.env
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG =~ /^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)/
    - if: $FORCE_BUILD == "1"  # allow manual force-build from any branch
