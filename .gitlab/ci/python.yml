verify_python:
  stage: verify
  # Change to Artifactory mirror for Python image:
  # image: "artifactory.example.local/docker-virtual/python:3.12-slim"
  image: $PYTHON_IMAGE
  needs: ["detect_changed_languages"]
  rules:
    - if: $PYTHON_CHANGED == "true"
      when: on_success
    - when: never
  script:
    - python --version
    # Python package index should point to Artifactory PyPI (recommended pip 24.3.1):
    # pip config set global.index-url https://artifactory.example.local/api/pypi/pypi/simple
    - pip install --upgrade pip
    - pip install ruff pytest
    # Dependencies from requirements.txt (recommend pinning exact versions there for reproducible builds).
    - pip install -r requirements.txt
    - pip check
    - ruff check --select F .
    - |
      if [ -d tests ] || [ -d test ]; then
        pytest -q
      else
        echo "No backend tests directory found; skipping pytest."
      fi
    - python -m compileall main.py Host_Manager.py Item_Manager.py Routes.py ZabbixBase.py

build_backend_image:
  stage: build
  extends: .kaniko_registry_auth
  image:
    name: $KANIKO_IMAGE_BACKEND
    entrypoint: [""]
  needs: ["verify_python", "detect_changed_languages"]
  rules:
    - if: $PYTHON_CHANGED == "true"
      when: on_success
    - when: never
  script:
    - |
      DEST="${ARTIFACTORY_DOCKER_REGISTRY}/${ARTIFACTORY_DOCKER_REPO_PATH}/backend:${CI_COMMIT_SHORT_SHA}"
      EXTRA=""
      if [ "$KANIKO_SKIP_TLS_VERIFY" = "true" ]; then
        EXTRA="${EXTRA} --skip-tls-verify"
      fi
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}" \
        --dockerfile "${CI_PROJECT_DIR}/Dockerfile.backend" \
        --destination "$DEST" \
        --compressed-caching=false \
        $EXTRA
