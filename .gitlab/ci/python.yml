# =============================================================================
# Backend (Python / FastAPI) pipeline.
# =============================================================================
# Runs only on tag pushes (see common.yml .rules_release).
# Each job is additionally gated by detect.yml so unchanged apps skip CI work.
# =============================================================================

.backend_base:
  extends: .base
  image: python:${PYTHON_VERSION}-slim
  needs:
    - job: detect
      artifacts: true

# ── Lint (ruff) ───────────────────────────────────────────────────────────────
backend:lint:
  extends: .backend_base
  stage: lint
  before_script:
    - pip install --no-cache-dir ruff
  script:
    - cd "$BACKEND_PATH"
    - ruff check .
    - ruff format --check .
  rules:
    - if: $CI_COMMIT_TAG && $BACKEND_CHANGED == "1"

# ── Type-check (mypy) ─────────────────────────────────────────────────────────
backend:typecheck:
  extends: .backend_base
  stage: lint
  before_script:
    - pip install --no-cache-dir mypy
    - pip install --no-cache-dir -r "$BACKEND_PATH/requirements.txt"
  script:
    - cd "$BACKEND_PATH"
    - mypy . --ignore-missing-imports
  rules:
    - if: $CI_COMMIT_TAG && $BACKEND_CHANGED == "1"

# ── Build & push Docker image ─────────────────────────────────────────────────
backend:docker:build:
  extends: .docker_base
  stage: build
  needs:
    - job: detect
      artifacts: true
    - job: backend:lint
      optional: true
  script:
    - |
      docker build \
        --cache-from "$BACKEND_IMAGE:latest" \
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA" \
        --label "org.opencontainers.image.version=$CI_COMMIT_TAG" \
        --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        -t "$BACKEND_IMAGE:$CI_COMMIT_TAG" \
        -t "$BACKEND_IMAGE:latest" \
        "$BACKEND_PATH/"
      docker push "$BACKEND_IMAGE:$CI_COMMIT_TAG"
      docker push "$BACKEND_IMAGE:latest"
      echo "BACKEND_IMAGE_TAG=$CI_COMMIT_TAG" > build-backend.env
  artifacts:
    reports:
      dotenv: build-backend.env
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG && $BACKEND_CHANGED == "1"
