verify_python:
  stage: verify
  # Change to Artifactory mirror for Python image:
  # image: "artifactory.example.local/docker-virtual/python:3.12-slim"
  image: $PYTHON_IMAGE
  needs: ["detect_changed_languages"]
  rules:
    - if: $PYTHON_CHANGED == "true"
      when: on_success
    - when: never
  script:
    - python --version
    # Python package index should point to Artifactory PyPI (recommended pip 24.3.1):
    # pip config set global.index-url https://artifactory.example.local/api/pypi/pypi/simple
    - pip install --upgrade pip
    - pip install ruff pytest
    # Dependencies from requirements.txt (recommend pinning exact versions there for reproducible builds).
    - pip install -r requirements.txt
    - pip check
    - ruff check --select F .
    - |
      if [ -d tests ] || [ -d test ]; then
        pytest -q
      else
        echo "No backend tests directory found; skipping pytest."
      fi
    - python -m compileall main.py Host_Manager.py Item_Manager.py Routes.py ZabbixBase.py

build_backend_image:
  stage: build
  extends: .docker_job
  needs: ["verify_python", "detect_changed_languages"]
  rules:
    - if: $PYTHON_CHANGED == "true"
      when: on_success
    - when: never
  script:
    - docker build -f Dockerfile.backend -t "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA" .
    - docker save "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA" -o backend-image.tar
  artifacts:
    paths:
      - backend-image.tar
    expire_in: 1 day

publish_staging_backend:
  stage: staging_publish
  extends: .docker_job
  needs:
    - build_backend_image
    - detect_changed_languages
  rules:
    - if: $CI_COMMIT_BRANCH == "develop" && $PYTHON_CHANGED == "true"
      when: on_success
    - when: never
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker load -i backend-image.tar
    - docker tag "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE/backend:staging"
    - docker push "$CI_REGISTRY_IMAGE/backend:staging"
    - docker push "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA"

publish_prod_backend:
  stage: prod_publish
  extends: .docker_job
  needs:
    - build_backend_image
    - detect_changed_languages
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $PYTHON_CHANGED == "true"
      when: manual
      allow_failure: false
    - if: $CI_COMMIT_TAG && $PYTHON_CHANGED == "true"
      when: manual
      allow_failure: false
    - when: never
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker load -i backend-image.tar
    - docker tag "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE/backend:latest"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_TAG"
      fi
    - docker push "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/backend:latest"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker push "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_TAG"
      fi
