# =============================================================================
# Elastic stack (Filebeat) pipeline.
# =============================================================================
# Builds and pushes a custom Filebeat image containing the project's
# filebeat.yml when apps/filebeat/ changes since the previous tag.
#
# The base image is docker.elastic.co/beats/filebeat — see
# apps/filebeat/Dockerfile for the PRIVATE NETWORK replacement comment.
# =============================================================================

# ── Build & push Filebeat Docker image ────────────────────────────────────────
filebeat:docker:build:
  extends: .docker_base
  stage: build
  needs:
    - job: detect
      artifacts: true
  script:
    - |
      /kaniko/executor \
        --context "$CI_PROJECT_DIR/$FILEBEAT_PATH/" \
        --dockerfile "$CI_PROJECT_DIR/$FILEBEAT_PATH/Dockerfile" \
        --destination "$FILEBEAT_IMAGE:$CI_COMMIT_TAG" \
        --destination "$FILEBEAT_IMAGE:latest" \
        --cache=true \
        --cache-repo "$FILEBEAT_IMAGE/cache" \
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA" \
        --label "org.opencontainers.image.version=$CI_COMMIT_TAG" \
        --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      echo "FILEBEAT_IMAGE_TAG=$CI_COMMIT_TAG" > build-filebeat.env
  artifacts:
    reports:
      dotenv: build-filebeat.env
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG && $FILEBEAT_CHANGED == "1"
