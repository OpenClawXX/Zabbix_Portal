services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: zabbix-portal-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zabbix-portal-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
