services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: zabbix-portal-backend
    ports:
      - "8000:8000"   # direct API access (useful for testing endpoints)
    env_file:
      - ./apps/backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: zabbix-portal-frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    # No published port — the proxy service below is the single entry point for the UI.

  proxy:
    # PRIVATE NETWORK: change to <your-registry>/docker-virtual/nginx:1.27-alpine
    image: nginx:1.27-alpine
    container_name: zabbix-portal-proxy
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    volumes:
      - ./nginx.compose.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

