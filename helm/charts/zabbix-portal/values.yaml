# Umbrella chart values — override sub-chart defaults here.
# Keys MUST match the sub-chart names declared in Chart.yaml dependencies.

backend:
  image:
    # PROJECT-SPECIFIC: set to your registry path, e.g. registry.example.com/my-app/backend
    repository: your-registry/backend
    tag: ""  # always overridden by --set backend.image.tag=$CI_COMMIT_TAG at deploy time
    pullPolicy: IfNotPresent

  replicaCount: 1

  serviceAccount:
    create: false

  podSecurityContext: {}

  securityContext: {}

  ingress:
    enabled: false

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # PROJECT-SPECIFIC: create this secret before deploying:
  #   kubectl create secret generic backend-secret \
  #     --from-literal=ZABBIX_URL=http://... \
  #     --from-literal=ZABBIX_USER=Admin \
  #     --from-literal=ZABBIX_PASS=... -n <namespace>
  existingSecret: "backend-secret"      # pre-existing Secret with: ZABBIX_USER, ZABBIX_PASS, SECRET_KEY (and optionally ZABBIX_URL, DATABASE_URL)
  existingConfigMap: "backend-config"   # pre-existing ConfigMap with: ZABBIX_URL, DATABASE_URL

  env: {}

frontend:
  image:
    # PROJECT-SPECIFIC: set to your registry path, e.g. registry.example.com/my-app/frontend
    repository: your-registry/frontend
    tag: ""  # always overridden by --set frontend.image.tag=$CI_COMMIT_TAG at deploy time
    pullPolicy: IfNotPresent

  replicaCount: 1

  serviceAccount:
    create: false

  podSecurityContext: {}

  securityContext: {}

  route:
    enabled: true
    host: ""  # leave empty — OpenShift auto-generates the hostname from the cluster domain
    tls:
      enabled: false
      termination: edge

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# NOTE: PostgreSQL is NOT deployed by this chart. It runs as a shared/external
# database; the backend reaches it via DATABASE_URL (set in backend-config /
# backend-secret). The umbrella Chart.yaml only depends on backend + frontend.
