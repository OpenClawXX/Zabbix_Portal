# Umbrella chart values - overrides values from sub-charts.
# Keys must match the sub-chart name exactly.

zabbix-portal-backend:
  image:
    repository: your-registry/zabbix-portal-backend
    tag: latest
    pullPolicy: IfNotPresent

  replicaCount: 1

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "90"
    hosts:
      - host: api.zabbix-portal.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  existingSecret: "zabbix-portal-backend-secret"

  env:
    ZABBIX_URL: ""
    ZABBIX_USER: ""

zabbix-portal-frontend:
  image:
    repository: your-registry/zabbix-portal-frontend
    tag: latest
    pullPolicy: IfNotPresent

  replicaCount: 1

  # apiProxy routes /api/* to the backend service at the Ingress level.
  # The backend service name is auto-derived as <release-name>-zabbix-portal-backend.
  # Override backendServiceName only if the backend is deployed separately.
  apiProxy:
    enabled: true
  backendServiceName: ""
  backendServicePort: 8000

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "90"
      # Strip /api prefix before forwarding to the backend service
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    hosts:
      - host: zabbix-portal.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

filebeat:
  image:
    # PRIVATE NETWORK: replace with your internal Artifactory / Nexus mirror.
    # e.g. <your-registry>/docker-virtual/docker.elastic.co/beats/filebeat:8.17.0
    # Keep the tag in sync with FILEBEAT_VERSION in .gitlab/ci/common.yml.
    repository: your-registry/filebeat
    tag: latest
    pullPolicy: IfNotPresent

  elasticsearch:
    # PRIVATE NETWORK: set hosts to your internal Elasticsearch cluster.
    # e.g. https://elasticsearch.internal.example.com:9200
    # For TLS with a self-signed / internal CA also set ssl.* fields in filebeat.yml.
    hosts: "elasticsearch:9200"
    username: "elastic"
    existingSecret: "filebeat-elasticsearch-secret"
    secretKey: "ELASTICSEARCH_PASSWORD"

  resources:
    requests:
      cpu: 100m
      memory: 100Mi
    limits:
      cpu: 200m
      memory: 200Mi
