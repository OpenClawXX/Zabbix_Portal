# Umbrella chart values — override sub-chart defaults here.
# Keys MUST match the sub-chart names declared in Chart.yaml dependencies.

backend:
  image:
    # PROJECT-SPECIFIC: set to your registry path, e.g. registry.example.com/my-app/backend
    repository: your-registry/backend
    tag: latest
    pullPolicy: IfNotPresent

  replicaCount: 1

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "90"
    hosts:
      - host: api.backend.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # PROJECT-SPECIFIC: create this secret before deploying:
  #   kubectl create secret generic backend-secret \
  #     --from-literal=ZABBIX_URL=http://... \
  #     --from-literal=ZABBIX_USER=Admin \
  #     --from-literal=ZABBIX_PASS=... -n <namespace>
  existingSecret: "backend-secret"

  env:
    ZABBIX_URL: ""
    ZABBIX_USER: ""

frontend:
  image:
    # PROJECT-SPECIFIC: set to your registry path, e.g. registry.example.com/my-app/frontend
    repository: your-registry/frontend
    tag: latest
    pullPolicy: IfNotPresent

  replicaCount: 1

  # apiProxy routes /api/* to the backend service at the Ingress level.
  # The backend service name is auto-derived as <release-name>-backend.
  # Override backendServiceName only if the backend is deployed separately.
  apiProxy:
    enabled: true
  backendServiceName: ""
  backendServicePort: 6769

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "90"
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    hosts:
      - host: frontend.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

filebeat:
  image:
    # PRIVATE NETWORK: replace with your internal Artifactory / Nexus mirror.
    # Keep the tag in sync with FILEBEAT_VERSION in .gitlab/ci/common.yml.
    repository: your-registry/filebeat
    tag: latest
    pullPolicy: IfNotPresent

  elasticsearch:
    # UPDATE ME: set to your existing Elasticsearch server URL.
    # e.g. https://elasticsearch.internal.example.com:9200
    hosts: ""
    username: "elastic"
    existingSecret: "filebeat-elasticsearch-secret"
    secretKey: "ELASTICSEARCH_PASSWORD"

  resources:
    requests:
      cpu: 100m
      memory: 100Mi
    limits:
      cpu: 200m
      memory: 200Mi

postgres:
  image:
    # PRIVATE NETWORK: replace with your internal Artifactory / Nexus mirror.
    repository: your-registry/postgres
    tag: "16"
    pullPolicy: IfNotPresent

  auth:
    database: zabbix_portal
    username: postgres
    # PROJECT-SPECIFIC: create before deploying:
    #   kubectl create secret generic postgres-secret \
    #     --from-literal=POSTGRES_PASSWORD=<password> -n <namespace>
    existingSecret: "postgres-secret"

  persistence:
    size: 5Gi
    storageClassName: ""

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
