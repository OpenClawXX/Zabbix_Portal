# Umbrella chart values — override sub-chart defaults here.
# Keys MUST match the sub-chart names declared in Chart.yaml dependencies.

backend:
  image:
    # PROJECT-SPECIFIC: set to your registry path, e.g. registry.example.com/my-app/backend
    repository: your-registry/backend
    tag: latest
    pullPolicy: IfNotPresent

  replicaCount: 1

  serviceAccount:
    create: false

  podSecurityContext: {}

  securityContext: {}

  ingress:
    enabled: false

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # PROJECT-SPECIFIC: create this secret before deploying:
  #   kubectl create secret generic backend-secret \
  #     --from-literal=ZABBIX_URL=http://... \
  #     --from-literal=ZABBIX_USER=Admin \
  #     --from-literal=ZABBIX_PASS=... -n <namespace>
  existingSecret: "backend-secret"

  env:
    ZABBIX_URL: ""
    ZABBIX_USER: ""

frontend:
  image:
    # PROJECT-SPECIFIC: set to your registry path, e.g. registry.example.com/my-app/frontend
    repository: your-registry/frontend
    tag: latest
    pullPolicy: IfNotPresent

  replicaCount: 1

  serviceAccount:
    create: false

  podSecurityContext: {}

  securityContext: {}

  route:
    enabled: true
    host: ""  # leave empty — OpenShift auto-generates the hostname from the cluster domain
    tls:
      enabled: false
      termination: edge

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

postgres:
  image:
    # PRIVATE NETWORK: replace with your internal Artifactory / Nexus mirror.
    repository: your-registry/postgres
    tag: "16"
    pullPolicy: IfNotPresent

  serviceAccount:
    create: false

  podSecurityContext: {}

  securityContext: {}

  auth:
    database: zabbix_portal
    username: postgres
    # PROJECT-SPECIFIC: create before deploying:
    #   kubectl create secret generic postgres-secret \
    #     --from-literal=POSTGRES_PASSWORD=<password> -n <namespace>
    existingSecret: "postgres-secret"

  persistence:
    size: 5Gi
    storageClassName: ""

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
