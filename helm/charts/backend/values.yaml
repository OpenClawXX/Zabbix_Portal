replicaCount: 1

image:
  repository: backend
  tag: ""  # always set by CI via --set backend.image.tag=$CI_COMMIT_TAG (gitops.yml)
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 6769

resources:
  requests:
    cpu: '4'
    memory: 1Gi
  limits:
    cpu: '6'
    memory: 2Gi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: 6769
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 6769
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

nodeSelector: {}

tolerations: []

affinity: {}

existingSecret: ""                # pre-existing Secret in OpenShift — Helm will not create a new one
existingConfigMap: ""  # pre-existing ConfigMap in OpenShift — Helm will not create a new one

# Secret values — pass via GitLab masked CI variables using --set at deploy time.
# Never hardcode real values here.
config:
  ALLOWED_ORIGINS: ""  # --set config.ALLOWED_ORIGINS=<comma-separated allowed origins, e.g. https://overwatch.example.com>
  BACKEND_URL: ""      # --set config.BACKEND_URL=<internal backend URL seen by the frontend, e.g. http://backend-svc:6769>

secret:
  zabbixUrl: ""       # --set secret.zabbixUrl=<your-zabbix-url>
  zabbixUser: ""      # --set secret.zabbixUser=<your-zabbix-username>
  zabbixPass: ""      # --set secret.zabbixPass=<your-zabbix-password>
  secretKey: ""       # --set secret.secretKey=<long-random-string — generate with: python -c "import secrets; print(secrets.token_hex(32))">
  databaseUrl: ""     # --set secret.databaseUrl=<postgresql://user:pass@host:5432/dbname>