{{- if .Values.ingress.enabled -}}
{{- $frontendSvc := include "zabbix-portal-frontend.fullname" . -}}
{{- $backendSvc  := include "zabbix-portal-frontend.backendServiceName" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "zabbix-portal-frontend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zabbix-portal-frontend.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- if $.Values.apiProxy.enabled }}
          # Route /api/* to the backend service (replaces the nginx proxy_pass
          # that used to run inside the frontend container).
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: {{ $backendSvc }}
                port:
                  number: {{ $.Values.backendServicePort }}
          {{- end }}
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $frontendSvc }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
