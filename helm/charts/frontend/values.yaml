replicaCount: 1

image:
  repository: frontend
  tag: ""  # always set by CI via --set frontend.image.tag=$CI_COMMIT_TAG (gitops.yml)
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podLabels: {}

# OpenShift assigns a random UID at runtime; GID is always 0 (root group).
# fsGroup: 0 ensures files copied in are readable by that GID.
podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 42069

backendUrl: ""  # set to http://<release-name>-backend:6769 — passed via --set in the deploy script

route:
  enabled: true
  host: ""  # leave empty — OpenShift auto-generates the hostname from the cluster domain
  tls:
    enabled: false
    termination: edge  # edge | passthrough | reencrypt

resources:
  requests:
    cpu: '1'
    memory: 500Mi
  limits:
    cpu: '2'
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /
    port: 42069
  initialDelaySeconds: 10
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 42069
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

nodeSelector: {}

tolerations: []

affinity: {}
