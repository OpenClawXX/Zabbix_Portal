image:
  # PRIVATE NETWORK: replace with your internal Artifactory / Nexus mirror.
  # e.g. <your-registry>/docker-virtual/docker.elastic.co/beats/filebeat:8.17.0
  # Keep this tag in sync with FILEBEAT_VERSION in .gitlab/ci/common.yml.
  repository: docker.elastic.co/beats/filebeat
  tag: "8.17.0"
  pullPolicy: IfNotPresent

elasticsearch:
  # PRIVATE NETWORK: set hosts to your internal Elasticsearch cluster.
  # e.g. https://elasticsearch.internal.example.com:9200
  # For TLS with a self-signed / internal CA also set in filebeat.yml:
  #   ssl.certificate_authorities: ["/path/to/ca.crt"]
  #   ssl.verification_mode: full  (use "none" only in isolated local dev)
  hosts: "elasticsearch:9200"
  username: "elastic"

  # Reference an existing Secret that holds the Elasticsearch password.
  # Create it before deploying:
  #   kubectl create secret generic filebeat-elasticsearch-secret \
  #     --from-literal=ELASTICSEARCH_PASSWORD=<password> -n <namespace>
  existingSecret: "filebeat-elasticsearch-secret"
  secretKey: "ELASTICSEARCH_PASSWORD"

serviceAccount:
  create: true
  name: ""

# OpenShift note: the DaemonSet mounts /var/log and /var/lib/docker/containers
# from the host node. You must grant the ServiceAccount the hostmount-anyuid SCC:
#   oc adm policy add-scc-to-user hostmount-anyuid \
#     -z <release-name>-filebeat -n <namespace>
tolerations: []

nodeSelector: {}

resources:
  requests:
    cpu: 100m
    memory: 100Mi
  limits:
    cpu: 200m
    memory: 200Mi
