# ── Staging environment overrides ────────────────────────────────────────────
# Applied on top of helm/charts/zabbix-portal/values.yaml

zabbix-portal-backend:
  replicaCount: 2

  image:
    repository: your-registry/zabbix-portal-backend
    tag: staging
    pullPolicy: IfNotPresent

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "90"
    hosts:
      - host: api.staging.zabbix-portal.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  config:
    LOG_LEVEL: "INFO"
    ENVIRONMENT: "staging"

  existingSecret: "zabbix-portal-backend-secret-staging"

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

zabbix-portal-frontend:
  replicaCount: 2

  image:
    repository: your-registry/zabbix-portal-frontend
    tag: staging
    pullPolicy: IfNotPresent

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    hosts:
      - host: staging.zabbix-portal.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
