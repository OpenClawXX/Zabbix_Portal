# ── Staging environment overrides ────────────────────────────────────────────
# Applied on top of helm/charts/<project>/values.yaml

backend:
  replicaCount: 2

  image:
    # PROJECT-SPECIFIC: set to your registry path
    repository: your-registry/backend
    tag: staging
    pullPolicy: IfNotPresent

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "90"
    hosts:
      - host: api.staging.backend.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  config:
    LOG_LEVEL: "INFO"
    ENVIRONMENT: "staging"

  # PROJECT-SPECIFIC: create before deploying:
  #   kubectl create secret generic backend-secret-staging --from-literal=... -n <namespace>
  existingSecret: "backend-secret-staging"

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

frontend:
  replicaCount: 2

  image:
    # PROJECT-SPECIFIC: set to your registry path
    repository: your-registry/frontend
    tag: staging
    pullPolicy: IfNotPresent

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    hosts:
      - host: staging.frontend.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

postgres:
  image:
    repository: your-registry/postgres
    tag: "16"
    pullPolicy: IfNotPresent

  auth:
    existingSecret: "postgres-secret-staging"

  persistence:
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
