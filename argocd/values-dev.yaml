# ── Dev environment overrides ─────────────────────────────────────────────────
# Applied on top of helm/charts/<project>/values.yaml

backend:
  replicaCount: 1

  image:
    # PROJECT-SPECIFIC: set to your registry path
    repository: your-registry/backend
    tag: latest
    pullPolicy: Always    # Always pull in dev to pick up fresh :latest images

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
    hosts:
      - host: api.dev.backend.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

  config:
    LOG_LEVEL: "DEBUG"
    ENVIRONMENT: "dev"

  # PROJECT-SPECIFIC: create before deploying:
  #   kubectl create secret generic backend-secret-dev --from-literal=... -n <namespace>
  existingSecret: "backend-secret-dev"

  autoscaling:
    enabled: false

frontend:
  replicaCount: 1

  image:
    # PROJECT-SPECIFIC: set to your registry path
    repository: your-registry/frontend
    tag: latest
    pullPolicy: Always

  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: dev.frontend.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

  autoscaling:
    enabled: false
