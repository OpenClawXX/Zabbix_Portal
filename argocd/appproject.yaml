# =============================================================================
# ArgoCD AppProject — TEMPLATE
# =============================================================================
# This file uses ${VAR} placeholders. Apply via the bootstrap script which
# substitutes them with envsubst:
#
#   ./argocd/bootstrap.sh
#
# Variables used (define them in .cienv or your shell before running):
#   PROJECT_NAME        e.g. zabbix-portal
#   ARGOCD_NAMESPACE    e.g. argocd
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ${PROJECT_NAME}
  namespace: ${ARGOCD_NAMESPACE}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "${PROJECT_NAME} — managed by ArgoCD"

  sourceRepos:
    - "*"

  destinations:
    - server: "*"
      namespace: "*"

  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  orphanedResources:
    warn: true

  roles:
    - name: read-only
      description: "Read-only access to the ${PROJECT_NAME} project"
      policies:
        - p, proj:${PROJECT_NAME}:read-only, applications, get, ${PROJECT_NAME}/*, allow
      groups:
        - ${PROJECT_NAME}-viewers
    - name: deploy
      description: "Deployment access to the ${PROJECT_NAME} project"
      policies:
        - p, proj:${PROJECT_NAME}:deploy, applications, *, ${PROJECT_NAME}/*, allow
      groups:
        - ${PROJECT_NAME}-deployers
