# =============================================================================
# ArgoCD Application — TEMPLATE (single-app, e.g. for production)
# =============================================================================
# Uses ${VAR} placeholders. Apply via ./argocd/bootstrap.sh.
#
# In most setups the ApplicationSet (applicationset.yaml) replaces this file
# entirely — it generates one Application per environment. Keep this file
# only if you want a single, manually-managed production Application.
#
# Variables used:
#   PROJECT_NAME            e.g. zabbix-portal
#   ARGOCD_NAMESPACE        e.g. argocd
#   REPO_URL                git repo URL of this monorepo
#   HELM_CHART_PATH         path to umbrella chart, e.g. helm/charts/zabbix-portal
#   K8S_NAMESPACE           target namespace in cluster
#   IN_CLUSTER_SERVER       usually https://kubernetes.default.svc
#   PROD_TARGET_REVISION    e.g. HEAD or a tag like v1.4.0
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${PROJECT_NAME}
  namespace: ${ARGOCD_NAMESPACE}
  labels:
    app.kubernetes.io/name: ${PROJECT_NAME}
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: ${PROJECT_NAME}-deploys
    notifications.argoproj.io/subscribe.on-sync-failed.slack: ${PROJECT_NAME}-alerts
spec:
  project: ${PROJECT_NAME}

  source:
    repoURL: ${REPO_URL}
    targetRevision: ${PROD_TARGET_REVISION}
    path: ${HELM_CHART_PATH}

    helm:
      releaseName: ${PROJECT_NAME}
      valueFiles:
        - values.yaml
        - values-production.yaml

  destination:
    server: ${IN_CLUSTER_SERVER}
    namespace: ${K8S_NAMESPACE}

  syncPolicy:
    automated:
      prune: true
      selfHeal: false       # Production: drift is reported, never auto-corrected
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas      # HPA owns replica count
