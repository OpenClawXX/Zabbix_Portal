# ── Production environment overrides ─────────────────────────────────────────
# Applied on top of helm/charts/<project>/values.yaml
# Higher replica counts, stricter resource limits, TLS enabled.

backend:
  replicaCount: 3

  image:
    # PROJECT-SPECIFIC: set to your registry path
    repository: your-registry/backend
    tag: stable      # Pin to a stable/immutable tag in production
    pullPolicy: IfNotPresent

  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "90"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/rate-limit: "100"
      nginx.ingress.kubernetes.io/rate-limit-burst-multiplier: "5"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: api.backend.example.com   # PROJECT-SPECIFIC: set to your production hostname
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: backend-tls
        hosts:
          - api.backend.example.com     # PROJECT-SPECIFIC: match the host above

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  config:
    LOG_LEVEL: "WARNING"
    ENVIRONMENT: "production"

  # PROJECT-SPECIFIC: create before deploying:
  #   kubectl create secret generic backend-secret-production --from-literal=... -n <namespace>
  existingSecret: "backend-secret-production"

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - backend   # matches the sub-chart name (Chart.yaml name: backend)
          topologyKey: kubernetes.io/hostname

frontend:
  replicaCount: 3

  image:
    # PROJECT-SPECIFIC: set to your registry path
    repository: your-registry/frontend
    tag: stable
    pullPolicy: IfNotPresent

  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/healthz"

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: frontend.example.com      # PROJECT-SPECIFIC: set to your production hostname
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: frontend-tls
        hosts:
          - frontend.example.com        # PROJECT-SPECIFIC: match the host above

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - frontend  # matches the sub-chart name (Chart.yaml name: frontend)
          topologyKey: kubernetes.io/hostname

postgres:
  image:
    repository: your-registry/postgres
    tag: "16"
    pullPolicy: IfNotPresent

  auth:
    # PROJECT-SPECIFIC: create before deploying:
    #   kubectl create secret generic postgres-secret-production \
    #     --from-literal=POSTGRES_PASSWORD=<strong-password> -n <namespace>
    existingSecret: "postgres-secret-production"

  persistence:
    size: 20Gi
    storageClassName: "fast-ssd"   # PROJECT-SPECIFIC: set to your production StorageClass

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
