# =============================================================================
# ArgoCD ApplicationSet — TEMPLATE
# =============================================================================
# Uses TWO different placeholder syntaxes:
#   ${VAR}     → substituted by envsubst at apply time (project-level config)
#   {{var}}    → ArgoCD ApplicationSet's own template syntax (per-env values)
#
# Apply via ./argocd/bootstrap.sh.
#
# Project-level variables (substituted by envsubst):
#   PROJECT_NAME            e.g. zabbix-portal
#   ARGOCD_NAMESPACE        e.g. argocd
#   REPO_URL                git repo URL of this monorepo
#   HELM_CHART_PATH         path to umbrella chart
#   IN_CLUSTER_SERVER       usually https://kubernetes.default.svc
#   BACKEND_HELM_KEY        e.g. zabbix-portal-backend
#   FRONTEND_HELM_KEY       e.g. zabbix-portal-frontend
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ${PROJECT_NAME}
  namespace: ${ARGOCD_NAMESPACE}
  labels:
    app.kubernetes.io/name: ${PROJECT_NAME}
    app.kubernetes.io/managed-by: argocd
spec:
  syncPolicy:
    preserveResourcesOnDeletion: false

  generators:
    - list:
        elements:
          # ── Development ──────────────────────────────────────────────
          - env: dev
            namespace: ${PROJECT_NAME}-dev
            targetRevision: HEAD
            backendHost: api.dev.${PROJECT_NAME}.local
            frontendHost: dev.${PROJECT_NAME}.local
            backendReplicas: "1"
            frontendReplicas: "1"
            backendTag: latest
            frontendTag: latest
            backendCpuRequest: "50m"
            backendMemRequest: "64Mi"
            backendCpuLimit: "250m"
            backendMemLimit: "256Mi"
            frontendCpuRequest: "25m"
            frontendMemRequest: "32Mi"
            frontendCpuLimit: "100m"
            frontendMemLimit: "128Mi"
            selfHeal: "true"

          # ── Staging ──────────────────────────────────────────────────
          - env: staging
            namespace: ${PROJECT_NAME}-staging
            targetRevision: HEAD
            backendHost: api.staging.${PROJECT_NAME}.local
            frontendHost: staging.${PROJECT_NAME}.local
            backendReplicas: "2"
            frontendReplicas: "2"
            backendTag: latest
            frontendTag: latest
            backendCpuRequest: "100m"
            backendMemRequest: "128Mi"
            backendCpuLimit: "500m"
            backendMemLimit: "512Mi"
            frontendCpuRequest: "50m"
            frontendMemRequest: "64Mi"
            frontendCpuLimit: "200m"
            frontendMemLimit: "256Mi"
            selfHeal: "true"

          # ── Production ───────────────────────────────────────────────
          - env: production
            namespace: ${PROJECT_NAME}
            targetRevision: main
            backendHost: api.${PROJECT_NAME}.example.com
            frontendHost: ${PROJECT_NAME}.example.com
            backendReplicas: "3"
            frontendReplicas: "3"
            backendTag: stable
            frontendTag: stable
            backendCpuRequest: "200m"
            backendMemRequest: "256Mi"
            backendCpuLimit: "1000m"
            backendMemLimit: "1Gi"
            frontendCpuRequest: "100m"
            frontendMemRequest: "128Mi"
            frontendCpuLimit: "500m"
            frontendMemLimit: "512Mi"
            selfHeal: "false"   # Production: never auto-correct drift

  template:
    metadata:
      name: "${PROJECT_NAME}-{{env}}"
      namespace: ${ARGOCD_NAMESPACE}
      labels:
        app.kubernetes.io/name: ${PROJECT_NAME}
        environment: "{{env}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        notifications.argoproj.io/subscribe.on-sync-failed.slack: ${PROJECT_NAME}-alerts

    spec:
      project: ${PROJECT_NAME}

      source:
        repoURL: ${REPO_URL}
        targetRevision: "{{targetRevision}}"
        path: ${HELM_CHART_PATH}

        helm:
          releaseName: "${PROJECT_NAME}-{{env}}"
          valueFiles:
            - values.yaml
            - "../../argocd/values-{{env}}.yaml"

          parameters:
            # Backend per-env overrides
            - name: ${BACKEND_HELM_KEY}.image.tag
              value: "{{backendTag}}"
            - name: ${BACKEND_HELM_KEY}.replicaCount
              value: "{{backendReplicas}}"
            - name: ${BACKEND_HELM_KEY}.ingress.enabled
              value: "true"
            - name: ${BACKEND_HELM_KEY}.ingress.className
              value: nginx
            - name: "${BACKEND_HELM_KEY}.ingress.hosts[0].host"
              value: "{{backendHost}}"
            - name: "${BACKEND_HELM_KEY}.ingress.hosts[0].paths[0].path"
              value: /
            - name: "${BACKEND_HELM_KEY}.ingress.hosts[0].paths[0].pathType"
              value: Prefix
            - name: ${BACKEND_HELM_KEY}.resources.requests.cpu
              value: "{{backendCpuRequest}}"
            - name: ${BACKEND_HELM_KEY}.resources.requests.memory
              value: "{{backendMemRequest}}"
            - name: ${BACKEND_HELM_KEY}.resources.limits.cpu
              value: "{{backendCpuLimit}}"
            - name: ${BACKEND_HELM_KEY}.resources.limits.memory
              value: "{{backendMemLimit}}"

            # Frontend per-env overrides
            - name: ${FRONTEND_HELM_KEY}.image.tag
              value: "{{frontendTag}}"
            - name: ${FRONTEND_HELM_KEY}.replicaCount
              value: "{{frontendReplicas}}"
            - name: ${FRONTEND_HELM_KEY}.ingress.enabled
              value: "true"
            - name: ${FRONTEND_HELM_KEY}.ingress.className
              value: nginx
            - name: "${FRONTEND_HELM_KEY}.ingress.hosts[0].host"
              value: "{{frontendHost}}"
            - name: "${FRONTEND_HELM_KEY}.ingress.hosts[0].paths[0].path"
              value: /
            - name: "${FRONTEND_HELM_KEY}.ingress.hosts[0].paths[0].pathType"
              value: Prefix
            - name: ${FRONTEND_HELM_KEY}.resources.requests.cpu
              value: "{{frontendCpuRequest}}"
            - name: ${FRONTEND_HELM_KEY}.resources.requests.memory
              value: "{{frontendMemRequest}}"
            - name: ${FRONTEND_HELM_KEY}.resources.limits.cpu
              value: "{{frontendCpuLimit}}"
            - name: ${FRONTEND_HELM_KEY}.resources.limits.memory
              value: "{{frontendMemLimit}}"

      destination:
        server: ${IN_CLUSTER_SERVER}
        namespace: "{{namespace}}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: "{{selfHeal}}"
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - ServerSideApply=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
